<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imperial Soccer — Treino</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/imperial.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            imperial: {
              green:         '#2a7a3d',
              'green-mid':   '#16a34a',
              'green-light': '#dcfce7',
              red:           '#dc2626',
              'red-light':   '#fee2e2',
              bg:            '#f0f4f1',
              card:          '#ffffff',
              text:          '#111827',
              'text-muted':  '#6b7280',
              border:        '#e5e7eb',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-imperial-bg text-imperial-text min-h-screen flex flex-col pb-16">

  <!-- Header -->
  <header class="w-full bg-imperial-green shadow-md px-5 py-4 flex items-center gap-3">
    <svg class="w-8 h-8 text-white shrink-0" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <path d="M12 2 C10 6 6 8 6 12 C6 16 10 18 12 22" stroke="currentColor" stroke-width="1" fill="none"/>
      <path d="M12 2 C14 6 18 8 18 12 C18 16 14 18 12 22" stroke="currentColor" stroke-width="1" fill="none"/>
      <path d="M2 12 L22 12" stroke="currentColor" stroke-width="1" fill="none"/>
    </svg>
    <div>
      <div class="text-base font-bold text-white leading-tight">Treino</div>
      <div class="text-xs text-white/70">Chamada e especificações do treino</div>
    </div>
  </header>

  <!-- Toast notification -->
  <div
    id="toast"
    class="hidden fixed top-6 right-4 z-50 px-5 py-3 rounded-xl text-sm font-medium shadow-xl pointer-events-none max-w-xs"
    role="status"
    aria-live="polite"
  ></div>

  <!-- Main -->
  <main class="flex-1 w-full max-w-2xl mx-auto px-4 py-6 space-y-4">

    <!-- ── Section: Lista de Treinos ───────────────────────────────────────── -->
    <section id="secaoLista">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold text-imperial-text">Treinos Realizados</h2>
        <button
          type="button"
          id="btnNovoTreino"
          class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-imperial-green hover:opacity-90 text-white text-sm font-semibold transition-all duration-200 shadow-md focus:outline-none focus:ring-2 focus:ring-imperial-green focus:ring-offset-2"
        >
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
          </svg>
          Novo Treino
        </button>
      </div>
      <div id="listaTreinos" class="space-y-3" role="list" aria-live="polite"></div>
    </section>

    <!-- ── Section: Formulário de Treino ───────────────────────────────────── -->
    <section id="secaoFormTreino" class="hidden space-y-4">
      <h2 id="tituloFormTreino" class="text-lg font-bold text-imperial-text">Novo Treino</h2>

      <!-- Data -->
      <div class="bg-imperial-card rounded-xl border border-imperial-border p-4 shadow-sm">
        <label for="inputDataTreino" class="block text-sm font-medium text-imperial-text mb-1">
          Data de Realização <span class="text-imperial-red">*</span>
        </label>
        <input
          type="date"
          id="inputDataTreino"
          class="w-full sm:w-64 px-4 py-2.5 rounded-lg bg-imperial-bg border border-imperial-border text-imperial-text focus:outline-none focus:ring-2 focus:ring-imperial-green focus:border-transparent transition-all"
        />
        <p id="erroDataTreino" class="hidden mt-1 text-xs text-imperial-red" role="alert"></p>
      </div>

      <!-- Categoria -->
      <div class="bg-imperial-card rounded-xl border border-imperial-border p-4 shadow-sm">
        <label for="selectCategoriaTreino" class="block text-sm font-medium text-imperial-text mb-1">
          Categoria <span class="text-imperial-red">*</span>
        </label>
        <select
          id="selectCategoriaTreino"
          class="w-full sm:w-64 px-4 py-2.5 rounded-lg bg-imperial-bg border border-imperial-border text-imperial-text focus:outline-none focus:ring-2 focus:ring-imperial-green focus:border-transparent transition-all"
        >
          <option value="">Selecione a categoria</option>
        </select>
        <p id="erroCategoriaTreino" class="hidden mt-1 text-xs text-imperial-red" role="alert"></p>
      </div>

      <!-- ── Chamada (Accordion) ──────────────────────────────────────────── -->
      <div id="chamadaContainer" class="hidden">
        <div
          id="chamadaHeader"
          class="bg-imperial-card rounded-xl border border-imperial-border px-4 py-3 flex items-center justify-between cursor-pointer select-none shadow-sm"
          role="button"
          aria-expanded="true"
          aria-controls="chamadaConteudo"
        >
          <div class="flex items-center gap-2">
            <span class="text-sm font-semibold text-imperial-text">Chamada</span>
            <span id="chamadaResumo" class="text-xs text-imperial-text-muted"></span>
          </div>
          <svg id="chamadaChevron" class="w-4 h-4 text-imperial-text-muted transition-transform duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
          </svg>
        </div>
        <div id="chamadaConteudo">
          <div id="controlesGlobais" class="hidden mt-2 flex gap-2">
            <button id="btnTodosPresentes" type="button" class="flex-1 py-2 rounded-lg text-sm font-medium border border-imperial-green-mid text-imperial-green-mid hover:bg-imperial-green-light btn-attendance focus:outline-none focus:ring-2 focus:ring-imperial-green-mid">Todos Presentes</button>
            <button id="btnTodosAusentes" type="button" class="flex-1 py-2 rounded-lg text-sm font-medium border border-imperial-red text-imperial-red hover:bg-imperial-red-light btn-attendance focus:outline-none focus:ring-2 focus:ring-imperial-red">Todos Ausentes</button>
          </div>
          <div id="painelResumo" class="hidden mt-2 bg-imperial-card rounded-xl shadow-sm border border-imperial-border px-4 py-3">
            <div class="flex items-center justify-between">
              <span id="tituloCategoria" class="text-sm font-semibold text-imperial-text"></span>
              <div class="flex gap-4">
                <div class="text-center">
                  <div id="contPresentes" class="text-xl font-bold text-imperial-green-mid">0</div>
                  <div class="text-xs text-imperial-text-muted">Presentes</div>
                </div>
                <div class="text-center">
                  <div id="contFaltas" class="text-xl font-bold text-imperial-red">0</div>
                  <div class="text-xs text-imperial-text-muted">Faltas</div>
                </div>
                <div class="text-center">
                  <div id="contPendentes" class="text-xl font-bold text-imperial-text-muted">0</div>
                  <div class="text-xs text-imperial-text-muted">Pendentes</div>
                </div>
              </div>
            </div>
          </div>
          <div id="listaAlunos" class="mt-2 space-y-2" role="list" aria-live="polite"></div>
        </div>
      </div>

      <!-- ── Especificações do Treino ─────────────────────────────────────── -->
      <section id="secaoEspecificacoes" class="hidden space-y-4">
        <div class="bg-imperial-card rounded-xl border border-imperial-border p-4 shadow-sm">
          <h3 class="text-sm font-semibold text-imperial-text mb-3">Momento do jogo</h3>
          <div id="gridMomentos" class="grid grid-cols-2 gap-2"></div>
        </div>
        <div class="bg-imperial-card rounded-xl border border-imperial-border p-4 shadow-sm">
          <div class="flex items-center justify-between mb-3">
            <h3 class="text-sm font-semibold text-imperial-text">Princípios e fundamentos trabalhados</h3>
            <span id="contadorPrincipios" class="text-xs text-imperial-green font-medium">0 selecionado(s)</span>
          </div>
          <div id="listaPrincipios" class="space-y-4"></div>
        </div>
      </section>

      <!-- Actions -->
      <div class="flex flex-col sm:flex-row gap-3 pt-1">
        <button
          type="button"
          id="btnSalvarTreino"
          class="w-full sm:w-auto px-8 py-3 rounded-xl bg-imperial-green hover:opacity-90 text-white font-semibold transition-all duration-200 shadow-md focus:outline-none focus:ring-2 focus:ring-imperial-green focus:ring-offset-2"
        >Salvar Treino</button>
        <button
          type="button"
          id="btnCancelarFormTreino"
          class="w-full sm:w-auto px-8 py-3 rounded-xl border border-imperial-border text-imperial-text-muted hover:text-imperial-text font-medium transition-all"
        >Cancelar</button>
      </div>
    </section>

  </main>

  <!-- Menu de navegação inferior -->
  <nav class="fixed bottom-0 left-0 right-0 bg-imperial-card border-t border-imperial-border flex h-16 z-40">
    <a href="students.html" class="flex-1 flex flex-col items-center justify-center gap-1 text-imperial-text-muted hover:text-imperial-green transition-colors" aria-label="Alunos">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
      <span class="text-xs font-medium">Alunos</span>
    </a>
    <a href="training.html" class="flex-1 flex flex-col items-center justify-center gap-1 text-imperial-green font-semibold border-t-2 border-imperial-green" aria-label="Treino" aria-current="page">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
      <span class="text-xs font-medium">Treino</span>
    </a>
    <a href="games.html" class="flex-1 flex flex-col items-center justify-center gap-1 text-imperial-text-muted hover:text-imperial-green transition-colors" aria-label="Jogos">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="14" r="6"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 8V5M10 5h4M12 14l2.5-2.5"/></svg>
      <span class="text-xs font-medium">Jogos</span>
    </a>
  </nav>

  <script type="module">
    // ─── Constants ───────────────────────────────────────────────────────────────
    const CATEGORIAS = ['Sub09', 'Sub10', 'Sub11', 'Sub12', 'Sub13', 'Sub14'];
    const CATEGORIAS_LABELS = {
      Sub09: 'Sub 09', Sub10: 'Sub 10', Sub11: 'Sub 11',
      Sub12: 'Sub 12', Sub13: 'Sub 13', Sub14: 'Sub 14',
    };
    const AVATAR_COLORS = [
      '#16a34a', '#f97316', '#ec4899', '#8b5cf6',
      '#06b6d4', '#eab308', '#ef4444', '#6366f1',
    ];

    // ─── Momentos do Jogo ────────────────────────────────────────────────────────
    const MOMENTOS = [
      { id: 'org_ofensiva',    label: 'Org. Ofensiva',    desc: 'Equipe com a posse, construindo jogadas' },
      { id: 'org_defensiva',   label: 'Org. Defensiva',   desc: 'Equipe sem a posse, organizada para defender' },
      { id: 'trans_ofensiva',  label: 'Trans. Ofensiva',  desc: 'Momento da recuperação da posse de bola' },
      { id: 'trans_defensiva', label: 'Trans. Defensiva',  desc: 'Momento da perda da posse de bola' },
    ];

    const MOMENTOS_ICONS = {
      org_ofensiva: `<svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>`,
      org_defensiva: `<svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m0-10.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.75c0 5.592 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.57-.598-3.75h-.152c-3.196 0-6.1-1.249-8.25-3.286z"/></svg>`,
      trans_ofensiva: `<svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/></svg>`,
      trans_defensiva: `<svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 7.5h-.75A2.25 2.25 0 004.5 9.75v7.5a2.25 2.25 0 002.25 2.25h7.5a2.25 2.25 0 002.25-2.25v-7.5a2.25 2.25 0 00-2.25-2.25h-.75m-6 3.75l3 3m0 0l3-3m-3 3V1.5"/></svg>`,
    };

    const MOMENTOS_TIPO = {
      org_ofensiva:   'ofensivo',
      org_defensiva:  'defensivo',
      trans_ofensiva: 'ofensivo',
      trans_defensiva: 'defensivo',
    };

    // ─── Princípios e Fundamentos ────────────────────────────────────────────────
    const PRINCIPIOS_GRUPOS = [
      {
        titulo: 'Princípios Táticos Defensivos',
        filtro: 'defensivo',
        itens: [
          { id: 'contencao',            label: 'Contenção' },
          { id: 'cobertura_defensiva',  label: 'Cobertura Defensiva' },
          { id: 'unidade_defensiva',    label: 'Unidade Defensiva' },
          { id: 'concentracao',         label: 'Concentração' },
          { id: 'equilibrio',           label: 'Equilíbrio' },
        ]
      },
      {
        titulo: 'Princípios Táticos Ofensivos',
        filtro: 'ofensivo',
        itens: [
          { id: 'espaco_sem_bola',     label: 'Espaço sem Bola' },
          { id: 'espaco_com_bola',     label: 'Espaço com Bola' },
          { id: 'cobertura_ofensiva',  label: 'Cobertura Ofensiva' },
          { id: 'unidade_ofensiva',    label: 'Unidade Ofensiva' },
          { id: 'penetracao',          label: 'Penetração' },
          { id: 'mobilidade',          label: 'Mobilidade' },
        ]
      },
      {
        titulo: 'Fundamentos Técnicos',
        filtro: 'sempre',
        itens: [
          { id: 'controle_chao',       label: 'Controle de Bola no Chão' },
          { id: 'controle_alto',       label: 'Controle de Bola no Alto' },
          { id: 'drible',              label: 'Drible' },
          { id: 'passe',               label: 'Passe' },
          { id: 'dominio',             label: 'Domínio' },
          { id: 'finalizacao',         label: 'Finalização' },
          { id: 'cabeceio',            label: 'Cabeceio' },
        ]
      }
    ];

    // ─── State & sessionStorage ──────────────────────────────────────────────────
    const STATE_KEY = 'imperialState';

    function loadState() {
      try {
        const raw = sessionStorage.getItem(STATE_KEY);
        if (!raw) return { alunos: [], avaliacoes: [], chamadas: [] };
        const parsed = JSON.parse(raw);
        if (!parsed.chamadas) parsed.chamadas = [];
        return parsed;
      } catch {
        return { alunos: [], avaliacoes: [], chamadas: [] };
      }
    }

    function saveState() {
      sessionStorage.setItem(STATE_KEY, JSON.stringify(state));
    }

    const state = loadState();

    // ─── Utilities ───────────────────────────────────────────────────────────────
    function generateId() { return crypto.randomUUID(); }
    function todayISO() { return new Date().toISOString().split('T')[0]; }

    function formatDate(isoDate) {
      if (!isoDate) return '';
      const [year, month, day] = isoDate.split('-');
      return `${day}/${month}/${year}`;
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function getInitials(nome) {
      const parts = nome.trim().split(/\s+/);
      if (parts.length === 1) return parts[0][0].toUpperCase();
      return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = [
        'fixed top-6 right-4 z-50 px-5 py-3 rounded-xl text-sm font-medium shadow-xl pointer-events-none max-w-xs',
        type === 'success' ? 'bg-imperial-green text-white' : 'bg-imperial-red text-white',
      ].join(' ');
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    function getLabelPrincipio(id) {
      for (const grupo of PRINCIPIOS_GRUPOS) {
        const item = grupo.itens.find(i => i.id === id);
        if (item) return item.label;
      }
      return id;
    }

    function getGruposVisiveis() {
      const tipos = new Set(['sempre']);
      for (const mId of momentosSelecionados) {
        if (MOMENTOS_TIPO[mId]) tipos.add(MOMENTOS_TIPO[mId]);
      }
      return tipos;
    }

    // ─── Domain logic ────────────────────────────────────────────────────────────
    function findChamada(data, categoria) {
      return state.chamadas.find(c => c.data === data && c.categoria === categoria) || null;
    }

    function criarChamada(data, categoria) {
      const alunosDaCategoria = state.alunos.filter(a => a.categoria === categoria);
      const registros = alunosDaCategoria.map(a => ({ alunoId: a.id, status: 'pendente' }));
      return { id: generateId(), data, categoria, registros, momentos: [], principiosFundamentos: [] };
    }

    function getOrCreateChamada(data, categoria) {
      const chamada = findChamada(data, categoria) || criarChamada(data, categoria);
      if (!chamada.momentos) chamada.momentos = [];
      if (!chamada.principiosFundamentos) chamada.principiosFundamentos = [];
      return chamada;
    }

    function setStatus(chamada, alunoId, status) {
      const registro = chamada.registros.find(r => r.alunoId === alunoId);
      if (registro) registro.status = status;
    }

    function salvarChamada(chamada) {
      const idx = state.chamadas.findIndex(c => c.data === chamada.data && c.categoria === chamada.categoria);
      if (idx !== -1) {
        state.chamadas[idx] = chamada;
      } else {
        state.chamadas.push(chamada);
      }
      saveState();
    }

    function deleteTreino(id) {
      state.chamadas = state.chamadas.filter(c => c.id !== id);
      saveState();
    }

    function contarStatus(chamada) {
      const presentes = chamada.registros.filter(r => r.status === 'presente').length;
      const faltas    = chamada.registros.filter(r => r.status === 'falta').length;
      const pendentes = chamada.registros.filter(r => r.status === 'pendente').length;
      return { presentes, faltas, pendentes };
    }

    // ─── UI State ────────────────────────────────────────────────────────────────
    let chamadaAtual = null;
    let treinoEditando = null;
    let momentosSelecionados = [];
    let principiosSelecionados = [];

    // ─── UI: Accordion da chamada ───────────────────────────────────────────────
    function toggleChamada() {
      const conteudo = document.getElementById('chamadaConteudo');
      const chevron = document.getElementById('chamadaChevron');
      const header = document.getElementById('chamadaHeader');
      const isExpanded = !conteudo.classList.contains('hidden');
      conteudo.classList.toggle('hidden');
      chevron.classList.toggle('rotate-180');
      header.setAttribute('aria-expanded', String(!isExpanded));
      atualizarChamadaResumo();
    }

    function atualizarChamadaResumo() {
      const resumo = document.getElementById('chamadaResumo');
      const conteudo = document.getElementById('chamadaConteudo');
      if (!conteudo.classList.contains('hidden') || !chamadaAtual) { resumo.textContent = ''; return; }
      const { presentes, faltas } = contarStatus(chamadaAtual);
      resumo.textContent = `${presentes} pres. · ${faltas} falt.`;
    }

    function atualizarContadores(chamada) {
      const { presentes, faltas, pendentes } = contarStatus(chamada);
      document.getElementById('contPresentes').textContent = presentes;
      document.getElementById('contFaltas').textContent    = faltas;
      document.getElementById('contPendentes').textContent = pendentes;
    }

    // ─── UI: lista de alunos (chamada) ───────────────────────────────────────────
    function renderListaAlunos(chamada) {
      const container = document.getElementById('listaAlunos');
      container.innerHTML = '';
      if (chamada.registros.length === 0) {
        container.innerHTML = `<div class="py-10 text-center text-imperial-text-muted text-sm">Nenhum aluno cadastrado nesta categoria.</div>`;
        document.getElementById('controlesGlobais').classList.add('hidden');
        return;
      }
      document.getElementById('controlesGlobais').classList.remove('hidden');
      chamada.registros.forEach((reg, index) => {
        const aluno = state.alunos.find(a => a.id === reg.alunoId);
        if (!aluno) return;
        const avatarColor = AVATAR_COLORS[index % AVATAR_COLORS.length];
        const initials = getInitials(aluno.nome);
        const btnBase = 'btn-attendance px-3 py-1.5 rounded-lg text-xs font-medium border focus:outline-none focus:ring-1';
        const isPres = reg.status === 'presente';
        const isFalt = reg.status === 'falta';
        const card = document.createElement('div');
        card.className = 'bg-imperial-card rounded-xl shadow-sm border border-imperial-border px-4 py-3 flex items-center gap-3';
        card.setAttribute('role', 'listitem');
        card.innerHTML = `
          <div class="avatar shrink-0" style="background-color: ${avatarColor};">${escapeHtml(initials)}</div>
          <div class="flex-1 min-w-0"><div class="font-medium text-imperial-text text-sm truncate">${escapeHtml(aluno.nome)}</div></div>
          <div class="flex gap-2 shrink-0">
            <button type="button" class="${btnBase} ${isPres ? 'border-imperial-green-mid bg-imperial-green-light text-imperial-green-mid' : 'border-imperial-border bg-imperial-card text-imperial-text-muted'}" data-aluno-id="${aluno.id}" data-action="presente" aria-pressed="${isPres}">Presente</button>
            <button type="button" class="${btnBase} ${isFalt ? 'border-imperial-red bg-imperial-red-light text-imperial-red' : 'border-imperial-border bg-imperial-card text-imperial-text-muted'}" data-aluno-id="${aluno.id}" data-action="falta" aria-pressed="${isFalt}">Falta</button>
          </div>`;
        card.querySelectorAll('button[data-action]').forEach(btn => {
          btn.addEventListener('click', () => {
            setStatus(chamada, btn.dataset.alunoId, btn.dataset.action);
            atualizarContadores(chamada);
            renderListaAlunos(chamada);
          });
        });
        container.appendChild(card);
      });
    }

    // ─── UI: Momentos ────────────────────────────────────────────────────────────
    function renderMomentos() {
      const container = document.getElementById('gridMomentos');
      container.innerHTML = MOMENTOS.map(m => {
        const sel = momentosSelecionados.includes(m.id);
        return `<button type="button" class="momento-card text-left rounded-xl border p-3 transition-all ${sel ? 'border-imperial-green bg-imperial-green-light' : 'border-imperial-border bg-imperial-card hover:border-imperial-text-muted'}" data-momento-id="${m.id}">
          <div class="flex items-center gap-2 mb-1">${MOMENTOS_ICONS[m.id]}<span class="text-sm font-semibold text-imperial-text">${m.label}</span></div>
          <div class="text-xs text-imperial-text-muted leading-snug">${m.desc}</div></button>`;
      }).join('');
      container.querySelectorAll('.momento-card').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.momentoId;
          const idx = momentosSelecionados.indexOf(id);
          if (idx >= 0) momentosSelecionados.splice(idx, 1);
          else momentosSelecionados.push(id);
          renderMomentos();
          renderPrincipios();
        });
      });
    }

    // ─── UI: Princípios/Fundamentos (com filtro por momento) ─────────────────────
    function renderPrincipios() {
      const container = document.getElementById('listaPrincipios');
      const visiveis = getGruposVisiveis();

      // Auto-desmarcar princípios de grupos ocultos
      PRINCIPIOS_GRUPOS.forEach(grupo => {
        if (!visiveis.has(grupo.filtro)) {
          const idsDoGrupo = new Set(grupo.itens.map(i => i.id));
          principiosSelecionados = principiosSelecionados.filter(id => !idsDoGrupo.has(id));
        }
      });

      container.innerHTML = PRINCIPIOS_GRUPOS.filter(grupo => visiveis.has(grupo.filtro)).map(grupo => {
        const chips = grupo.itens.map(item => {
          const sel = principiosSelecionados.includes(item.id);
          return `<button type="button" class="principio-chip px-3 py-1.5 rounded-full text-xs font-medium border transition-all ${sel ? 'border-imperial-green bg-imperial-green-light text-imperial-green' : 'border-imperial-border bg-imperial-bg text-imperial-text-muted hover:border-imperial-text-muted'}" data-principio-id="${item.id}">${item.label}</button>`;
        }).join('');
        return `<div><h4 class="text-xs font-bold text-imperial-text-muted uppercase tracking-wide mb-2">${grupo.titulo}</h4><div class="flex flex-wrap gap-2">${chips}</div></div>`;
      }).join('');

      container.querySelectorAll('.principio-chip').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.principioId;
          const idx = principiosSelecionados.indexOf(id);
          if (idx >= 0) principiosSelecionados.splice(idx, 1);
          else principiosSelecionados.push(id);
          renderPrincipios();
        });
      });

      document.getElementById('contadorPrincipios').textContent = `${principiosSelecionados.length} selecionado(s)`;
    }

    // ─── UI: Lista de treinos (tela principal) ───────────────────────────────────
    function renderListaTreinos() {
      treinoEditando = null;
      chamadaAtual = null;
      momentosSelecionados = [];
      principiosSelecionados = [];
      document.getElementById('secaoLista').classList.remove('hidden');
      document.getElementById('secaoFormTreino').classList.add('hidden');

      const sorted = [...state.chamadas].sort((a, b) => b.data.localeCompare(a.data));
      const container = document.getElementById('listaTreinos');

      if (sorted.length === 0) {
        container.innerHTML = '<div class="py-14 text-center text-imperial-text-muted text-sm">Nenhum treino registrado ainda.</div>';
        return;
      }

      container.innerHTML = sorted.map(c => {
        const { presentes } = contarStatus(c);
        const total = c.registros.length;
        const pfs = (c.principiosFundamentos || []).map(id => escapeHtml(getLabelPrincipio(id)));
        const maxChips = 4;
        const visibleChips = pfs.slice(0, maxChips);
        const extraCount = pfs.length - maxChips;

        return `
          <div class="bg-imperial-card rounded-xl px-4 py-3 border border-imperial-border shadow-sm" role="listitem">
            <div class="flex items-center justify-between mb-1">
              <div class="font-semibold text-sm text-imperial-text">${formatDate(c.data)}</div>
              <span class="px-2 py-0.5 rounded-full bg-imperial-green-light text-imperial-green border border-imperial-green text-xs font-medium">${CATEGORIAS_LABELS[c.categoria] || c.categoria}</span>
            </div>
            <div class="text-xs text-imperial-text-muted">${presentes} presente${presentes !== 1 ? 's' : ''} de ${total} aluno${total !== 1 ? 's' : ''}</div>
            ${pfs.length > 0 ? `<div class="flex flex-wrap gap-1 mt-2">${visibleChips.map(l => `<span class="px-2 py-0.5 rounded-full text-xs bg-imperial-bg border border-imperial-border text-imperial-text-muted">${l}</span>`).join('')}${extraCount > 0 ? `<span class="px-2 py-0.5 rounded-full text-xs bg-imperial-bg border border-imperial-border text-imperial-text-muted">+${extraCount}</span>` : ''}</div>` : ''}
            <div class="flex gap-2 mt-2 justify-end">
              <button type="button" class="btn-editar-treino px-3 py-1.5 rounded-lg text-xs font-medium border border-imperial-border text-imperial-text-muted hover:text-imperial-text hover:border-imperial-text-muted transition-all" data-treino-id="${escapeHtml(c.id)}">Editar</button>
              <button type="button" class="btn-excluir-treino px-3 py-1.5 rounded-lg text-xs font-medium border border-imperial-red/30 text-imperial-red hover:bg-imperial-red-light transition-all" data-treino-id="${escapeHtml(c.id)}">Excluir</button>
            </div>
          </div>`;
      }).join('');

      // Delegated events
      container.querySelectorAll('.btn-editar-treino').forEach(btn => {
        btn.addEventListener('click', () => {
          const treino = state.chamadas.find(c => c.id === btn.dataset.treinoId);
          if (treino) renderFormTreino(treino);
        });
      });
      container.querySelectorAll('.btn-excluir-treino').forEach(btn => {
        btn.addEventListener('click', () => {
          if (window.confirm('Excluir este treino? Esta ação não pode ser desfeita.')) {
            deleteTreino(btn.dataset.treinoId);
            renderListaTreinos();
            showToast('Treino excluído.', 'error');
          }
        });
      });
    }

    // ─── UI: Formulário de treino ────────────────────────────────────────────────
    function renderFormTreino(chamada) {
      document.getElementById('secaoLista').classList.add('hidden');
      document.getElementById('secaoFormTreino').classList.remove('hidden');

      const inputData = document.getElementById('inputDataTreino');
      const selectCat = document.getElementById('selectCategoriaTreino');
      const erroData = document.getElementById('erroDataTreino');
      const erroCat = document.getElementById('erroCategoriaTreino');
      erroData.classList.add('hidden');
      erroCat.classList.add('hidden');

      if (chamada) {
        treinoEditando = chamada;
        document.getElementById('tituloFormTreino').textContent = 'Editar Treino';
        inputData.value = chamada.data;
        selectCat.value = chamada.categoria;
        inputData.disabled = true;
        selectCat.disabled = true;
        momentosSelecionados = [...(chamada.momentos || [])];
        principiosSelecionados = [...(chamada.principiosFundamentos || [])];
        chamadaAtual = chamada;
        carregarChamadaForm();
      } else {
        treinoEditando = null;
        document.getElementById('tituloFormTreino').textContent = 'Novo Treino';
        inputData.value = todayISO();
        selectCat.value = '';
        inputData.disabled = false;
        selectCat.disabled = false;
        momentosSelecionados = [];
        principiosSelecionados = [];
        chamadaAtual = null;
        document.getElementById('chamadaContainer').classList.add('hidden');
        document.getElementById('secaoEspecificacoes').classList.add('hidden');
      }
    }

    function carregarChamadaForm() {
      const data = document.getElementById('inputDataTreino').value;
      const categoria = document.getElementById('selectCategoriaTreino').value;

      if (!data || !categoria) {
        document.getElementById('chamadaContainer').classList.add('hidden');
        document.getElementById('secaoEspecificacoes').classList.add('hidden');
        return;
      }

      if (treinoEditando) {
        chamadaAtual = treinoEditando;
      } else {
        chamadaAtual = getOrCreateChamada(data, categoria);
      }

      // Show chamada accordion
      document.getElementById('chamadaContainer').classList.remove('hidden');
      document.getElementById('tituloCategoria').textContent =
        `${CATEGORIAS_LABELS[categoria]} — ${chamadaAtual.registros.length} aluno${chamadaAtual.registros.length !== 1 ? 's' : ''}`;
      document.getElementById('painelResumo').classList.remove('hidden');
      atualizarContadores(chamadaAtual);
      renderListaAlunos(chamadaAtual);
      atualizarChamadaResumo();

      // Show especificações
      document.getElementById('secaoEspecificacoes').classList.remove('hidden');
      renderMomentos();
      renderPrincipios();
    }

    // ─── Events ──────────────────────────────────────────────────────────────────
    document.getElementById('btnNovoTreino').addEventListener('click', () => renderFormTreino(null));
    document.getElementById('btnCancelarFormTreino').addEventListener('click', () => renderListaTreinos());
    document.getElementById('chamadaHeader').addEventListener('click', toggleChamada);

    document.getElementById('btnTodosPresentes').addEventListener('click', () => {
      if (!chamadaAtual) return;
      chamadaAtual.registros.forEach(r => { r.status = 'presente'; });
      atualizarContadores(chamadaAtual);
      renderListaAlunos(chamadaAtual);
    });

    document.getElementById('btnTodosAusentes').addEventListener('click', () => {
      if (!chamadaAtual) return;
      chamadaAtual.registros.forEach(r => { r.status = 'falta'; });
      atualizarContadores(chamadaAtual);
      renderListaAlunos(chamadaAtual);
    });

    document.getElementById('inputDataTreino').addEventListener('change', () => {
      if (!treinoEditando) carregarChamadaForm();
    });
    document.getElementById('selectCategoriaTreino').addEventListener('change', () => {
      if (!treinoEditando) carregarChamadaForm();
    });

    document.getElementById('btnSalvarTreino').addEventListener('click', () => {
      const erroData = document.getElementById('erroDataTreino');
      const erroCat = document.getElementById('erroCategoriaTreino');
      erroData.classList.add('hidden');
      erroCat.classList.add('hidden');

      const data = document.getElementById('inputDataTreino').value;
      const categoria = document.getElementById('selectCategoriaTreino').value;

      let valid = true;
      if (!data) {
        erroData.textContent = 'Data é obrigatória.';
        erroData.classList.remove('hidden');
        document.getElementById('inputDataTreino').focus();
        valid = false;
      }
      if (!categoria) {
        erroCat.textContent = 'Categoria é obrigatória.';
        erroCat.classList.remove('hidden');
        if (valid) document.getElementById('selectCategoriaTreino').focus();
        valid = false;
      }
      if (!valid) return;

      if (!chamadaAtual) {
        chamadaAtual = getOrCreateChamada(data, categoria);
      }

      chamadaAtual.momentos = [...momentosSelecionados];
      chamadaAtual.principiosFundamentos = [...principiosSelecionados];

      const isEditing = !!treinoEditando;
      salvarChamada(chamadaAtual);
      renderListaTreinos();
      showToast(isEditing ? 'Treino atualizado com sucesso!' : 'Treino salvo com sucesso!');
    });

    // ─── Boot ────────────────────────────────────────────────────────────────────
    // Populate category select
    const selCat = document.getElementById('selectCategoriaTreino');
    CATEGORIAS.forEach(cat => {
      const opt = document.createElement('option');
      opt.value = cat;
      opt.textContent = CATEGORIAS_LABELS[cat];
      selCat.appendChild(opt);
    });

    document.getElementById('inputDataTreino').max = todayISO();

    renderListaTreinos();
  </script>

</body>
</html>
