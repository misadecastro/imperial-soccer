<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Imperial Soccer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/imperial.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            imperial: {
              green:         '#2a7a3d',
              'green-mid':   '#16a34a',
              'green-light': '#dcfce7',
              red:           '#dc2626',
              'red-light':   '#fee2e2',
              bg:            '#f0f4f1',
              card:          '#ffffff',
              text:          '#111827',
              'text-muted':  '#6b7280',
              border:        '#e5e7eb',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-imperial-bg text-imperial-text min-h-screen flex flex-col items-center justify-center px-4 py-10">

  <!-- Card de login -->
  <div class="w-full max-w-sm bg-imperial-card rounded-2xl shadow-xl border border-imperial-border overflow-hidden">

    <!-- Cabeçalho do card — verde sólido -->
    <div class="bg-imperial-green px-8 py-7 text-center">
      <!-- Ícone de bola -->
      <div class="flex justify-center mb-3">
        <svg class="w-10 h-10 text-white" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <path d="M12 2 C10 6 6 8 6 12 C6 16 10 18 12 22" stroke="currentColor" stroke-width="1" fill="none"/>
          <path d="M12 2 C14 6 18 8 18 12 C18 16 14 18 12 22" stroke="currentColor" stroke-width="1" fill="none"/>
          <path d="M2 12 L22 12" stroke="currentColor" stroke-width="1" fill="none"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-white">
        Imperial Soccer
      </h1>
      <p class="text-white/70 text-sm mt-1">Acesso ao sistema de gestão</p>
    </div>

    <!-- Formulário -->
    <div class="px-8 py-8">
      <form action="#" method="post" novalidate>

        <!-- Campo usuário/e-mail -->
        <div class="mb-5">
          <label for="usuario" class="block text-sm font-medium text-imperial-text mb-2">
            Usuário ou E-mail
          </label>
          <input
            id="usuario"
            type="text"
            name="usuario"
            autocomplete="username"
            placeholder="seu@email.com"
            class="w-full px-4 py-3 rounded-xl bg-imperial-bg border border-imperial-border text-imperial-text placeholder-imperial-text-muted focus:outline-none focus:ring-2 focus:ring-imperial-green focus:border-transparent transition-all text-sm"
            aria-label="Usuário ou e-mail"
          />
        </div>

        <!-- Campo senha -->
        <div class="mb-7">
          <label for="senha" class="block text-sm font-medium text-imperial-text mb-2">
            Senha
          </label>
          <input
            id="senha"
            type="password"
            name="senha"
            autocomplete="current-password"
            placeholder="••••••••"
            class="w-full px-4 py-3 rounded-xl bg-imperial-bg border border-imperial-border text-imperial-text placeholder-imperial-text-muted focus:outline-none focus:ring-2 focus:ring-imperial-green focus:border-transparent transition-all text-sm"
            aria-label="Senha de acesso"
          />
        </div>

        <!-- Botão Entrar -->
        <button
          type="submit"
          class="w-full flex items-center justify-center gap-2 px-6 py-3 rounded-xl bg-imperial-green hover:opacity-90 text-white font-semibold text-sm transition-all duration-200 shadow-md focus:outline-none focus:ring-2 focus:ring-imperial-green focus:ring-offset-2"
          aria-label="Entrar no sistema"
        >
          Entrar
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6" />
          </svg>
        </button>

      </form>
    </div>

  </div>

  <!-- Link de voltar -->
  <a
    href="../index.html"
    class="mt-6 inline-flex items-center gap-1 text-sm text-imperial-text-muted hover:text-imperial-green transition-colors"
    aria-label="Voltar para a página inicial"
  >
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M11 17l-5-5m0 0l5-5m-5 5h12" />
    </svg>
    Voltar para o início
  </a>

  <script>
    document.querySelector('form').addEventListener('submit', function (e) {
      e.preventDefault();
      window.location.href = 'students.html';
    });
  </script>
</body>
</html>
