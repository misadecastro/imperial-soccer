<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imperial Soccer — Alunos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/imperial.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            imperial: {
              green:         '#2a7a3d',
              'green-mid':   '#16a34a',
              'green-light': '#dcfce7',
              red:           '#dc2626',
              'red-light':   '#fee2e2',
              bg:            '#f0f4f1',
              card:          '#ffffff',
              text:          '#111827',
              'text-muted':  '#6b7280',
              border:        '#e5e7eb',
            }
          },
          fontFamily: {
            display: ['Georgia', 'serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-imperial-bg text-imperial-text min-h-screen flex flex-col pb-16">

  <!-- Header -->
  <header class="w-full bg-imperial-green shadow-md px-5 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <svg class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <path d="M12 2 C10 6 6 8 6 12 C6 16 10 18 12 22" stroke="currentColor" stroke-width="1" fill="none"/>
        <path d="M12 2 C14 6 18 8 18 12 C18 16 14 18 12 22" stroke="currentColor" stroke-width="1" fill="none"/>
        <path d="M2 12 L22 12" stroke="currentColor" stroke-width="1" fill="none"/>
      </svg>
      <div>
        <div class="text-base font-bold text-white leading-tight">Imperial Soccer</div>
        <div class="text-xs text-white/70">Gestão de Alunos</div>
      </div>
    </div>
    <a
      href="../index.html"
      class="inline-flex items-center gap-1 text-sm font-medium text-white/80 hover:text-white transition-colors"
    >
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M11 17l-5-5m0 0l5-5m-5 5h12" />
      </svg>
      Sair
    </a>
  </header>

  <!-- Toast notification -->
  <div
    id="toast"
    class="hidden fixed top-6 right-6 z-50 px-5 py-3 rounded-xl text-sm font-medium shadow-xl pointer-events-none"
    role="status"
    aria-live="polite"
  ></div>

  <!-- Main -->
  <main class="flex-1 w-full max-w-2xl mx-auto px-4 py-6 space-y-6">

    <!-- ── Section 1: Cadastrar Aluno ───────────────────────────────────── -->
    <section aria-labelledby="tituloCadastro" class="hidden">
      <h2 id="tituloCadastro" class="text-lg font-bold mb-4 text-imperial-text">Cadastrar Aluno</h2>

      <form id="formCadastro" class="bg-imperial-card rounded-2xl p-5 space-y-4 border border-imperial-border shadow-sm" novalidate>

        <!-- Nome -->
        <div>
          <label for="inputNome" class="block text-sm font-medium text-imperial-text mb-1">
            Nome do Aluno <span class="text-imperial-red">*</span>
          </label>
          <input
            type="text"
            id="inputNome"
            placeholder="Nome completo"
            class="w-full px-4 py-2.5 rounded-lg bg-imperial-bg border border-imperial-border text-imperial-text placeholder-imperial-text-muted focus:outline-none focus:ring-2 focus:ring-imperial-green focus:border-transparent transition-all"
          />
          <p id="erroNome" class="hidden mt-1 text-xs text-imperial-red" role="alert"></p>
        </div>

        <!-- Data de Nascimento -->
        <div>
          <label for="inputDataNascimento" class="block text-sm font-medium text-imperial-text mb-1">
            Data de Nascimento <span class="text-imperial-red">*</span>
          </label>
          <input
            type="date"
            id="inputDataNascimento"
            class="w-full px-4 py-2.5 rounded-lg bg-imperial-bg border border-imperial-border text-imperial-text focus:outline-none focus:ring-2 focus:ring-imperial-green focus:border-transparent transition-all"
          />
          <p id="erroDataNascimento" class="hidden mt-1 text-xs text-imperial-red" role="alert"></p>
        </div>

        <!-- Categoria -->
        <div>
          <label for="selectCategoria" class="block text-sm font-medium text-imperial-text mb-1">
            Categoria <span class="text-imperial-red">*</span>
          </label>
          <select
            id="selectCategoria"
            class="w-full px-4 py-2.5 rounded-lg bg-imperial-bg border border-imperial-border text-imperial-text focus:outline-none focus:ring-2 focus:ring-imperial-green focus:border-transparent transition-all"
          >
            <option value="">Selecione a categoria</option>
          </select>
          <p id="erroCategoria" class="hidden mt-1 text-xs text-imperial-red" role="alert"></p>
        </div>

        <!-- Submit -->
        <div class="pt-1 flex gap-3">
          <button
            type="submit"
            class="flex-1 sm:flex-none sm:w-auto px-6 py-2.5 rounded-xl bg-imperial-green hover:opacity-90 text-white font-semibold transition-all duration-200 shadow-md focus:outline-none focus:ring-2 focus:ring-imperial-green focus:ring-offset-2"
          >
            Cadastrar
          </button>
          <button
            type="button"
            id="btnCancelarCadastro"
            class="flex-1 sm:flex-none sm:w-auto px-6 py-2.5 rounded-xl border border-imperial-border text-imperial-text-muted hover:text-imperial-text font-medium transition-all"
          >
            Cancelar
          </button>
        </div>

      </form>
    </section>

    <!-- ── Section 2: Listagem + Filtros ────────────────────────────────── -->
    <section aria-labelledby="tituloListagem">
      <div class="flex items-center justify-between mb-4">
        <h2 id="tituloListagem" class="text-lg font-bold text-imperial-text">Alunos Cadastrados</h2>
        <button
          type="button"
          id="btnNovoAluno"
          class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-imperial-green hover:opacity-90 text-white text-sm font-semibold transition-all duration-200 shadow-md focus:outline-none focus:ring-2 focus:ring-imperial-green focus:ring-offset-2"
        >
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
          </svg>
          Novo Aluno
        </button>
      </div>

      <!-- Filters -->
      <div class="flex flex-col sm:flex-row gap-3 mb-4">
        <input
          type="text"
          id="filtroNome"
          placeholder="Buscar por nome..."
          class="flex-1 px-4 py-2.5 rounded-lg bg-imperial-card border border-imperial-border text-imperial-text placeholder-imperial-text-muted focus:outline-none focus:ring-2 focus:ring-imperial-green focus:border-transparent transition-all shadow-sm"
          aria-label="Filtrar por nome"
        />
        <select
          id="filtroCategoria"
          class="sm:w-52 px-4 py-2.5 rounded-lg bg-imperial-card border border-imperial-border text-imperial-text focus:outline-none focus:ring-2 focus:ring-imperial-green focus:border-transparent transition-all shadow-sm"
          aria-label="Filtrar por categoria"
        >
          <option value="">Todas as categorias</option>
        </select>
      </div>

      <!-- Student list -->
      <div id="listaAlunos" class="space-y-2" role="list" aria-live="polite"></div>

    </section>

  </main>

  <!-- Menu de navegação inferior -->
  <nav class="fixed bottom-0 left-0 right-0 bg-imperial-card border-t border-imperial-border flex h-16 z-40">
    <a
      href="students.html"
      class="flex-1 flex flex-col items-center justify-center gap-1 text-imperial-green border-t-2 border-imperial-green font-semibold"
      aria-label="Alunos"
      aria-current="page"
    >
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
      <span class="text-xs font-medium">Alunos</span>
    </a>
    <a
      href="training.html"
      class="flex-1 flex flex-col items-center justify-center gap-1 text-imperial-text-muted hover:text-imperial-green transition-colors"
      aria-label="Treino"
    >
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
      <span class="text-xs font-medium">Treino</span>
    </a>
  </nav>

  <script type="module">
    // ─── Constants ──────────────────────────────────────────────────────────────
    const CATEGORIAS = ['Sub09', 'Sub10', 'Sub11', 'Sub12', 'Sub13', 'Sub14'];

    const CATEGORIAS_LABELS = {
      Sub09: 'Sub 09',
      Sub10: 'Sub 10',
      Sub11: 'Sub 11',
      Sub12: 'Sub 12',
      Sub13: 'Sub 13',
      Sub14: 'Sub 14',
    };

    const ICONS = {
      tecnico: `<svg class="w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 2 C10 6 6 8 6 12 C6 16 10 18 12 22" stroke-width="1"/>
        <path d="M12 2 C14 6 18 8 18 12 C18 16 14 18 12 22" stroke-width="1"/>
        <path d="M2 12 L22 12" stroke-width="1"/>
      </svg>`,
      tatico: `<svg class="w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <path stroke-linejoin="round" d="M12 2 L22 12 L12 22 L2 12 Z"/>
        <path stroke-linejoin="round" stroke-width="1" d="M12 6 L18 12 L12 18 L6 12 Z"/>
      </svg>`,
      mental: `<svg class="w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 21h6"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 21v-4"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3C9.2 3 7 5.2 7 8c0 2.2 1.3 4.1 3.2 5l-.2 4h4l-.2-4C15.7 12.1 17 10.2 17 8c0-2.8-2.2-5-5-5z"/>
      </svg>`,
    };

    // ─── State & sessionStorage ──────────────────────────────────────────────────
    const STATE_KEY = 'imperialState';

    function loadState() {
      try {
        const raw = sessionStorage.getItem(STATE_KEY);
        if (!raw) return { alunos: [], avaliacoes: [] };
        return JSON.parse(raw);
      } catch {
        return { alunos: [], avaliacoes: [] };
      }
    }

    function saveState() {
      sessionStorage.setItem(STATE_KEY, JSON.stringify(state));
    }

    const state = loadState();

    // ─── Utilities ──────────────────────────────────────────────────────────────
    function generateId() {
      return crypto.randomUUID();
    }

    function formatDate(isoDate) {
      if (!isoDate) return '';
      const [year, month, day] = isoDate.split('-');
      return `${day}/${month}/${year}`;
    }

    function getAvaliacaoByAlunoId(alunoId) {
      return state.avaliacoes
        .filter(a => a.alunoId === alunoId)
        .sort((a, b) => new Date(b.data) - new Date(a.data))[0] || null;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = [
        'fixed top-6 right-6 z-50 px-5 py-3 rounded-xl text-sm font-medium shadow-xl pointer-events-none',
        type === 'success'
          ? 'bg-imperial-green text-white'
          : 'bg-imperial-red text-white',
      ].join(' ');
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    // ─── Init dropdowns ─────────────────────────────────────────────────────────
    function initCategoriaDropdowns() {
      const targets = [
        document.getElementById('selectCategoria'),
        document.getElementById('filtroCategoria'),
      ];
      CATEGORIAS.forEach(cat => {
        targets.forEach(sel => {
          const opt = document.createElement('option');
          opt.value = cat;
          opt.textContent = CATEGORIAS_LABELS[cat];
          sel.appendChild(opt);
        });
      });
    }

    // ─── Render nota radio group ────────────────────────────────────────────────
    // ─── Avatar color palette ────────────────────────────────────────────────────
    const AVATAR_COLORS = [
      '#16a34a', '#f97316', '#ec4899', '#8b5cf6',
      '#06b6d4', '#eab308', '#ef4444', '#6366f1',
    ];

    function getAvatarColor(index) {
      return AVATAR_COLORS[index % AVATAR_COLORS.length];
    }

    function getInitials(nome) {
      const parts = nome.trim().split(/\s+/);
      if (parts.length === 1) return parts[0][0].toUpperCase();
      return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
    }

    // ─── Render evaluation chips ────────────────────────────────────────────────
    function renderEvalChips(avaliacao) {
      const aspectos = [
        { key: 'tecnico', label: 'Téc' },
        { key: 'tatico',  label: 'Tát' },
        { key: 'mental',  label: 'Ment' },
      ];
      return `<div class="flex items-center gap-1.5 flex-wrap mt-1">
        ${aspectos.map(({ key, label }) => {
          const nota = avaliacao ? avaliacao[key] : null;
          const ativo = nota !== null;
          return `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs border ${
            ativo
              ? 'bg-imperial-green-light text-imperial-green border-imperial-green'
              : 'bg-imperial-bg text-imperial-text-muted border-imperial-border'
          }">
            ${ICONS[key]}
            <span>${label}</span>
            <span class="font-bold">${ativo ? nota : '–'}</span>
          </span>`;
        }).join('')}
      </div>`;
    }

    // ─── Render student list ─────────────────────────────────────────────────────
    function renderAlunos() {
      const filtroNome = document.getElementById('filtroNome').value.trim().toLowerCase();
      const filtroCategoria = document.getElementById('filtroCategoria').value;

      const filtered = state.alunos.filter(aluno => {
        const matchNome = !filtroNome || aluno.nome.toLowerCase().includes(filtroNome);
        const matchCat  = !filtroCategoria || aluno.categoria === filtroCategoria;
        return matchNome && matchCat;
      });

      const container = document.getElementById('listaAlunos');

      if (filtered.length === 0) {
        const msg = state.alunos.length === 0
          ? 'Nenhum aluno cadastrado ainda.'
          : 'Nenhum aluno encontrado para os filtros aplicados.';
        container.innerHTML = `
          <div class="py-14 text-center text-imperial-text-muted text-sm">${msg}</div>
        `;
        return;
      }

      container.innerHTML = filtered.map((aluno, index) => {
        const avaliacao = getAvaliacaoByAlunoId(aluno.id);
        const avatarColor = getAvatarColor(index);
        const initials = getInitials(aluno.nome);
        return `
          <div class="bg-imperial-card rounded-xl px-4 py-3 flex items-center gap-3 border border-imperial-border shadow-sm" role="listitem">
            <!-- Avatar -->
            <div class="avatar shrink-0" style="background-color: ${avatarColor};">${escapeHtml(initials)}</div>
            <!-- Info -->
            <div class="flex-1 min-w-0">
              <div class="font-semibold text-imperial-text text-sm truncate">${escapeHtml(aluno.nome)}</div>
              <div class="text-xs text-imperial-text-muted flex items-center gap-2 flex-wrap mt-0.5">
                <span>Nasc.: ${formatDate(aluno.dataNascimento)}</span>
                <span>·</span>
                <span class="px-2 py-0.5 rounded-full bg-imperial-green-light text-imperial-green border border-imperial-green text-xs">
                  ${CATEGORIAS_LABELS[aluno.categoria]}
                </span>
              </div>
              ${renderEvalChips(avaliacao)}
            </div>
            <!-- Actions -->
            <div class="flex flex-col gap-1.5 shrink-0">
              <button
                type="button"
                data-aluno-id="${aluno.id}"
                class="btn-avaliar btn-attendance px-3 py-1.5 rounded-lg border border-imperial-green text-imperial-green text-xs font-medium hover:bg-imperial-green hover:text-white"
              >
                Avaliar
              </button>
              <button
                type="button"
                data-aluno-id="${aluno.id}"
                class="btn-excluir-aluno btn-attendance px-3 py-1.5 rounded-lg border border-imperial-red/30 text-imperial-red text-xs font-medium hover:bg-imperial-red-light"
              >
                Excluir
              </button>
            </div>
          </div>
        `;
      }).join('');

      // Attach Avaliar button listeners — navigates to student-eval page
      container.querySelectorAll('.btn-avaliar').forEach(btn => {
        btn.addEventListener('click', () => {
          saveState();
          window.location.href = `student-eval.html?alunoId=${btn.dataset.alunoId}`;
        });
      });

      // Attach Excluir button listeners
      container.querySelectorAll('.btn-excluir-aluno').forEach(btn => {
        btn.addEventListener('click', () => excluirAluno(btn.dataset.alunoId));
      });
    }

    // ─── Excluir Aluno ───────────────────────────────────────────────────────────
    function excluirAluno(id) {
      if (!window.confirm('Excluir este aluno? Esta ação também remove todas as suas avaliações.')) return;
      state.alunos = state.alunos.filter(a => a.id !== id);
      state.avaliacoes = state.avaliacoes.filter(a => a.alunoId !== id);
      saveState();
      renderAlunos();
      showToast('Aluno excluído.', 'error');
    }

    // ─── Toggle cadastro ────────────────────────────────────────────────────────
    const secaoCadastro = document.querySelector('section[aria-labelledby="tituloCadastro"]');

    function fecharCadastro() {
      secaoCadastro.classList.add('hidden');
    }

    function toggleCadastro() {
      secaoCadastro.classList.toggle('hidden');
    }

    document.getElementById('btnNovoAluno').addEventListener('click', toggleCadastro);
    document.getElementById('btnCancelarCadastro').addEventListener('click', fecharCadastro);

    // ─── US1: Cadastrar Aluno ───────────────────────────────────────────────────
    function validateCadastroForm(nome, dataNascimento, categoria) {
      const erros = [];
      if (!nome || nome.trim().length < 2) {
        erros.push({ campo: 'nome', msg: 'O nome é obrigatório (mínimo 2 caracteres).' });
      }
      if (!dataNascimento) {
        erros.push({ campo: 'dataNascimento', msg: 'A data de nascimento é obrigatória.' });
      } else if (new Date(dataNascimento) > new Date()) {
        erros.push({ campo: 'dataNascimento', msg: 'A data de nascimento não pode ser uma data futura.' });
      }
      if (!categoria) {
        erros.push({ campo: 'categoria', msg: 'Selecione uma categoria.' });
      }
      return erros;
    }

    function clearFormErrors() {
      ['Nome', 'DataNascimento', 'Categoria'].forEach(campo => {
        const el = document.getElementById(`erro${campo}`);
        if (el) { el.textContent = ''; el.classList.add('hidden'); }
      });
    }

    function showFormError(campo, msg) {
      const key = campo.charAt(0).toUpperCase() + campo.slice(1);
      const el = document.getElementById(`erro${key}`);
      if (el) { el.textContent = msg; el.classList.remove('hidden'); }
    }

    document.getElementById('formCadastro').addEventListener('submit', function (e) {
      e.preventDefault();
      clearFormErrors();

      const nome = document.getElementById('inputNome').value.trim();
      const dataNascimento = document.getElementById('inputDataNascimento').value;
      const categoria = document.getElementById('selectCategoria').value;

      const erros = validateCadastroForm(nome, dataNascimento, categoria);
      if (erros.length > 0) {
        erros.forEach(err => showFormError(err.campo, err.msg));
        return;
      }

      state.alunos.push({ id: generateId(), nome, dataNascimento, categoria });
      saveState();

      // Reset form fields
      document.getElementById('inputNome').value = '';
      document.getElementById('inputDataNascimento').value = '';
      document.getElementById('selectCategoria').value = '';

      renderAlunos();
      fecharCadastro();
      showToast('Aluno cadastrado com sucesso!');
    });

    // ─── US2: Filters ───────────────────────────────────────────────────────────
    document.getElementById('filtroNome').addEventListener('input', renderAlunos);
    document.getElementById('filtroCategoria').addEventListener('change', renderAlunos);

    // ─── Mock data ───────────────────────────────────────────────────────────────
    const NOMES = ['Lucas', 'Gabriel', 'Pedro', 'Mateus', 'Rafael', 'Felipe', 'Gustavo', 'Henrique',
                   'Bruno', 'Thiago', 'Carlos', 'Diego', 'André', 'Rodrigo', 'Leonardo',
                   'Ana', 'Beatriz', 'Julia', 'Mariana', 'Larissa', 'Camila', 'Isabela',
                   'Fernanda', 'Amanda', 'Natalia'];
    const SOBRENOMES = ['Silva', 'Santos', 'Oliveira', 'Souza', 'Lima', 'Ferreira', 'Costa',
                        'Rodrigues', 'Almeida', 'Nascimento', 'Carvalho', 'Pereira', 'Gomes', 'Martins', 'Rocha'];
    const CATEGORIAS_MOCK = ['Sub09', 'Sub10', 'Sub11', 'Sub12', 'Sub13', 'Sub14'];

    function gerarNomeAleatorio() {
      const nome = NOMES[Math.floor(Math.random() * NOMES.length)];
      const sobrenome = SOBRENOMES[Math.floor(Math.random() * SOBRENOMES.length)];
      return `${nome} ${sobrenome}`;
    }

    function gerarDataAleatoria(inicio, fim) {
      const tsInicio = new Date(inicio).getTime();
      const tsFim = new Date(fim).getTime();
      const ts = tsInicio + Math.random() * (tsFim - tsInicio);
      return new Date(ts).toISOString().split('T')[0];
    }

    function gerarMockData() {
      const alunos = [];
      const avaliacoes = [];
      for (let i = 0; i < 40; i++) {
        const alunoId = generateId();
        const categoria = CATEGORIAS_MOCK[i % CATEGORIAS_MOCK.length];
        const anoNasc = 2010 + Math.floor(Math.random() * 8);
        const mesNasc = String(1 + Math.floor(Math.random() * 12)).padStart(2, '0');
        const diaNasc = String(1 + Math.floor(Math.random() * 28)).padStart(2, '0');
        alunos.push({
          id: alunoId,
          nome: gerarNomeAleatorio(),
          dataNascimento: `${anoNasc}-${mesNasc}-${diaNasc}`,
          categoria,
        });

        const qtd = 5 + Math.floor(Math.random() * 11); // 5–15
        const datasUsadas = new Set();
        for (let j = 0; j < qtd; j++) {
          let data;
          let tentativas = 0;
          do {
            data = gerarDataAleatoria('2025-01-01', '2026-04-04');
            tentativas++;
          } while (datasUsadas.has(data) && tentativas < 50);
          datasUsadas.add(data);
          avaliacoes.push({
            id: generateId(),
            alunoId,
            data,
            tatico:  2 + Math.floor(Math.random() * 4),
            tecnico: 2 + Math.floor(Math.random() * 4),
            mental:  2 + Math.floor(Math.random() * 4),
          });
        }
      }
      return { alunos, avaliacoes };
    }

    // ─── Boot ────────────────────────────────────────────────────────────────────
    initCategoriaDropdowns();

    if (state.alunos.length === 0) {
      const mock = gerarMockData();
      state.alunos.push(...mock.alunos);
      state.avaliacoes.push(...mock.avaliacoes);
      saveState();
    }

    renderAlunos();
  </script>
