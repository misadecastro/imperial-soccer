<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imperial Soccer — Alunos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            imperial: {
              green: '#16a34a',
              'green-dark': '#15803d',
              'green-light': '#4ade80',
              dark: '#0f172a',
              'dark-2': '#1e293b',
            }
          },
          fontFamily: {
            display: ['Georgia', 'serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-imperial-dark text-white min-h-screen flex flex-col">

  <!-- Header -->
  <header class="w-full px-6 py-5 flex items-center justify-between border-b border-white/10">
    <div class="flex items-center gap-3">
      <svg class="w-9 h-9 text-imperial-green" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <path d="M12 2 C10 6 6 8 6 12 C6 16 10 18 12 22" stroke="currentColor" stroke-width="1" fill="none"/>
        <path d="M12 2 C14 6 18 8 18 12 C18 16 14 18 12 22" stroke="currentColor" stroke-width="1" fill="none"/>
        <path d="M2 12 L22 12" stroke="currentColor" stroke-width="1" fill="none"/>
      </svg>
      <span class="text-xl font-bold tracking-wide text-white">Imperial <span class="text-imperial-green">Soccer</span></span>
    </div>
    <a
      href="../index.html"
      class="inline-flex items-center gap-1 text-sm font-medium text-imperial-green-light hover:text-white transition-colors"
    >
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M11 17l-5-5m0 0l5-5m-5 5h12" />
      </svg>
      Voltar ao Login
    </a>
  </header>

  <!-- Toast notification -->
  <div
    id="toast"
    class="hidden fixed top-6 right-6 z-50 px-5 py-3 rounded-xl text-sm font-medium shadow-xl pointer-events-none"
    role="status"
    aria-live="polite"
  ></div>

  <!-- Main -->
  <main class="flex-1 w-full max-w-4xl mx-auto px-4 sm:px-6 py-8 space-y-10">

    <!-- ── Section 1: Cadastrar Aluno ───────────────────────────────────── -->
    <section aria-labelledby="tituloCadastro" class="hidden">
      <h2 id="tituloCadastro" class="text-2xl font-bold mb-6 text-white">Cadastrar Aluno</h2>

      <form id="formCadastro" class="bg-imperial-dark-2 rounded-2xl p-6 space-y-5 border border-white/5" novalidate>

        <!-- Nome -->
        <div>
          <label for="inputNome" class="block text-sm font-medium text-slate-300 mb-1">
            Nome do Aluno <span class="text-red-400">*</span>
          </label>
          <input
            type="text"
            id="inputNome"
            placeholder="Nome completo"
            class="w-full px-4 py-2.5 rounded-lg bg-imperial-dark border border-white/10 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-imperial-green focus:border-transparent transition-all"
          />
          <p id="erroNome" class="hidden mt-1 text-xs text-red-400" role="alert"></p>
        </div>

        <!-- Data de Nascimento -->
        <div>
          <label for="inputDataNascimento" class="block text-sm font-medium text-slate-300 mb-1">
            Data de Nascimento <span class="text-red-400">*</span>
          </label>
          <input
            type="date"
            id="inputDataNascimento"
            class="w-full px-4 py-2.5 rounded-lg bg-imperial-dark border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-imperial-green focus:border-transparent transition-all"
          />
          <p id="erroDataNascimento" class="hidden mt-1 text-xs text-red-400" role="alert"></p>
        </div>

        <!-- Categoria -->
        <div>
          <label for="selectCategoria" class="block text-sm font-medium text-slate-300 mb-1">
            Categoria <span class="text-red-400">*</span>
          </label>
          <select
            id="selectCategoria"
            class="w-full px-4 py-2.5 rounded-lg bg-imperial-dark border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-imperial-green focus:border-transparent transition-all"
          >
            <option value="">Selecione a categoria</option>
          </select>
          <p id="erroCategoria" class="hidden mt-1 text-xs text-red-400" role="alert"></p>
        </div>

        <!-- Submit -->
        <div class="pt-1">
          <button
            type="submit"
            class="w-full sm:w-auto px-8 py-3 rounded-xl bg-imperial-green hover:bg-imperial-green-dark text-white font-semibold transition-all duration-200 shadow-lg shadow-imperial-green/20 hover:shadow-imperial-green/40 focus:outline-none focus:ring-2 focus:ring-imperial-green focus:ring-offset-2 focus:ring-offset-imperial-dark-2"
          >
            Cadastrar
          </button>
        </div>

      </form>
    </section>

    <!-- ── Section 2: Listagem + Filtros ────────────────────────────────── -->
    <section aria-labelledby="tituloListagem">
      <div class="flex items-center justify-between mb-6">
        <h2 id="tituloListagem" class="text-2xl font-bold text-white">Alunos Cadastrados</h2>
        <button
          type="button"
          id="btnNovoAluno"
          class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-imperial-green hover:bg-imperial-green-dark text-white text-sm font-semibold transition-all duration-200 shadow-lg shadow-imperial-green/20 hover:shadow-imperial-green/40 focus:outline-none focus:ring-2 focus:ring-imperial-green focus:ring-offset-2 focus:ring-offset-imperial-dark"
        >
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
          </svg>
          Novo Aluno
        </button>
      </div>

      <!-- Filters -->
      <div class="flex flex-col sm:flex-row gap-3 mb-6">
        <input
          type="text"
          id="filtroNome"
          placeholder="Buscar por nome..."
          class="flex-1 px-4 py-2.5 rounded-lg bg-imperial-dark-2 border border-white/10 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-imperial-green focus:border-transparent transition-all"
          aria-label="Filtrar por nome"
        />
        <select
          id="filtroCategoria"
          class="sm:w-56 px-4 py-2.5 rounded-lg bg-imperial-dark-2 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-imperial-green focus:border-transparent transition-all"
          aria-label="Filtrar por categoria"
        >
          <option value="">Todas as categorias</option>
        </select>
      </div>

      <!-- Student list -->
      <div id="listaAlunos" class="space-y-3" role="list" aria-live="polite"></div>

    </section>

  </main>

  <!-- Footer -->
  <footer class="w-full px-6 py-5 text-center text-xs text-slate-600 border-t border-white/5">
    © 2026 Imperial Soccer — Todos os direitos reservados
  </footer>

  <script type="module">
    // ─── Constants ──────────────────────────────────────────────────────────────
    const CATEGORIAS = ['Sub09', 'Sub10', 'Sub11', 'Sub12', 'Sub13', 'Sub14'];

    const CATEGORIAS_LABELS = {
      Sub09: 'Sub 09',
      Sub10: 'Sub 10',
      Sub11: 'Sub 11',
      Sub12: 'Sub 12',
      Sub13: 'Sub 13',
      Sub14: 'Sub 14',
    };

    const ICONS = {
      tecnico: `<svg class="w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 2 C10 6 6 8 6 12 C6 16 10 18 12 22" stroke-width="1"/>
        <path d="M12 2 C14 6 18 8 18 12 C18 16 14 18 12 22" stroke-width="1"/>
        <path d="M2 12 L22 12" stroke-width="1"/>
      </svg>`,
      tatico: `<svg class="w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <path stroke-linejoin="round" d="M12 2 L22 12 L12 22 L2 12 Z"/>
        <path stroke-linejoin="round" stroke-width="1" d="M12 6 L18 12 L12 18 L6 12 Z"/>
      </svg>`,
      mental: `<svg class="w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 21h6"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 21v-4"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3C9.2 3 7 5.2 7 8c0 2.2 1.3 4.1 3.2 5l-.2 4h4l-.2-4C15.7 12.1 17 10.2 17 8c0-2.8-2.2-5-5-5z"/>
      </svg>`,
    };

    // ─── State & sessionStorage ──────────────────────────────────────────────────
    const STATE_KEY = 'imperialState';

    function loadState() {
      try {
        const raw = sessionStorage.getItem(STATE_KEY);
        if (!raw) return { alunos: [], avaliacoes: [] };
        return JSON.parse(raw);
      } catch {
        return { alunos: [], avaliacoes: [] };
      }
    }

    function saveState() {
      sessionStorage.setItem(STATE_KEY, JSON.stringify(state));
    }

    const state = loadState();

    // ─── Utilities ──────────────────────────────────────────────────────────────
    function generateId() {
      return crypto.randomUUID();
    }

    function formatDate(isoDate) {
      if (!isoDate) return '';
      const [year, month, day] = isoDate.split('-');
      return `${day}/${month}/${year}`;
    }

    function getAvaliacaoByAlunoId(alunoId) {
      return state.avaliacoes
        .filter(a => a.alunoId === alunoId)
        .sort((a, b) => new Date(b.data) - new Date(a.data))[0] || null;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = [
        'fixed top-6 right-6 z-50 px-5 py-3 rounded-xl text-sm font-medium shadow-xl pointer-events-none',
        type === 'success'
          ? 'bg-imperial-green text-white'
          : 'bg-red-700 text-white',
      ].join(' ');
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    // ─── Init dropdowns ─────────────────────────────────────────────────────────
    function initCategoriaDropdowns() {
      const targets = [
        document.getElementById('selectCategoria'),
        document.getElementById('filtroCategoria'),
      ];
      CATEGORIAS.forEach(cat => {
        targets.forEach(sel => {
          const opt = document.createElement('option');
          opt.value = cat;
          opt.textContent = CATEGORIAS_LABELS[cat];
          sel.appendChild(opt);
        });
      });
    }

    // ─── Render nota radio group ────────────────────────────────────────────────
    // ─── Render evaluation chips ────────────────────────────────────────────────
    function renderEvalChips(avaliacao) {
      const aspectos = [
        { key: 'tecnico', label: 'Téc' },
        { key: 'tatico',  label: 'Tát' },
        { key: 'mental',  label: 'Ment' },
      ];
      return `<div class="flex items-center gap-1.5 flex-wrap mt-2">
        ${aspectos.map(({ key, label }) => {
          const nota = avaliacao ? avaliacao[key] : null;
          const ativo = nota !== null;
          return `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs border ${
            ativo
              ? 'bg-imperial-green/10 text-imperial-green-light border-imperial-green/30'
              : 'bg-white/5 text-slate-500 border-white/10'
          }">
            ${ICONS[key]}
            <span>${label}</span>
            <span class="font-bold">${ativo ? nota : '–'}</span>
          </span>`;
        }).join('')}
      </div>`;
    }

    // ─── Render student list ─────────────────────────────────────────────────────
    function renderAlunos() {
      const filtroNome = document.getElementById('filtroNome').value.trim().toLowerCase();
      const filtroCategoria = document.getElementById('filtroCategoria').value;

      const filtered = state.alunos.filter(aluno => {
        const matchNome = !filtroNome || aluno.nome.toLowerCase().includes(filtroNome);
        const matchCat  = !filtroCategoria || aluno.categoria === filtroCategoria;
        return matchNome && matchCat;
      });

      const container = document.getElementById('listaAlunos');

      if (filtered.length === 0) {
        const msg = state.alunos.length === 0
          ? 'Nenhum aluno cadastrado ainda.'
          : 'Nenhum aluno encontrado para os filtros aplicados.';
        container.innerHTML = `
          <div class="py-14 text-center text-slate-500 text-sm">${msg}</div>
        `;
        return;
      }

      container.innerHTML = filtered.map(aluno => {
        const avaliacao = getAvaliacaoByAlunoId(aluno.id);
        return `
          <div class="bg-imperial-dark-2 rounded-xl px-5 py-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 border border-white/5" role="listitem">
            <div class="space-y-1">
              <div class="flex items-center gap-2 flex-wrap">
                <span class="font-semibold text-white">${escapeHtml(aluno.nome)}</span>
              </div>
              <div class="text-sm text-slate-400 flex items-center gap-2 flex-wrap">
                <span>Nasc.: ${formatDate(aluno.dataNascimento)}</span>
                <span class="text-slate-600">·</span>
                <span class="px-2 py-0.5 rounded-full text-xs bg-imperial-green/15 text-imperial-green-light border border-imperial-green/25">
                  ${CATEGORIAS_LABELS[aluno.categoria]}
                </span>
              </div>
              ${renderEvalChips(avaliacao)}
            </div>
            <button
              type="button"
              data-aluno-id="${aluno.id}"
              class="btn-avaliar self-start sm:self-auto shrink-0 px-4 py-2 rounded-lg border border-imperial-green/40 text-imperial-green-light text-sm font-medium hover:bg-imperial-green hover:text-white hover:border-imperial-green transition-all"
            >
              Avaliar
            </button>
          </div>
        `;
      }).join('');

      // Attach Avaliar button listeners — navigates to student-eval page
      container.querySelectorAll('.btn-avaliar').forEach(btn => {
        btn.addEventListener('click', () => {
          saveState();
          window.location.href = `student-eval.html?alunoId=${btn.dataset.alunoId}`;
        });
      });
    }

    // ─── Toggle cadastro ────────────────────────────────────────────────────────
    const secaoCadastro = document.querySelector('section[aria-labelledby="tituloCadastro"]');

    function fecharCadastro() {
      secaoCadastro.classList.add('hidden');
    }

    function toggleCadastro() {
      secaoCadastro.classList.toggle('hidden');
    }

    document.getElementById('btnNovoAluno').addEventListener('click', toggleCadastro);

    // ─── US1: Cadastrar Aluno ───────────────────────────────────────────────────
    function validateCadastroForm(nome, dataNascimento, categoria) {
      const erros = [];
      if (!nome || nome.trim().length < 2) {
        erros.push({ campo: 'nome', msg: 'O nome é obrigatório (mínimo 2 caracteres).' });
      }
      if (!dataNascimento) {
        erros.push({ campo: 'dataNascimento', msg: 'A data de nascimento é obrigatória.' });
      } else if (new Date(dataNascimento) > new Date()) {
        erros.push({ campo: 'dataNascimento', msg: 'A data de nascimento não pode ser uma data futura.' });
      }
      if (!categoria) {
        erros.push({ campo: 'categoria', msg: 'Selecione uma categoria.' });
      }
      return erros;
    }

    function clearFormErrors() {
      ['Nome', 'DataNascimento', 'Categoria'].forEach(campo => {
        const el = document.getElementById(`erro${campo}`);
        if (el) { el.textContent = ''; el.classList.add('hidden'); }
      });
    }

    function showFormError(campo, msg) {
      const key = campo.charAt(0).toUpperCase() + campo.slice(1);
      const el = document.getElementById(`erro${key}`);
      if (el) { el.textContent = msg; el.classList.remove('hidden'); }
    }

    document.getElementById('formCadastro').addEventListener('submit', function (e) {
      e.preventDefault();
      clearFormErrors();

      const nome = document.getElementById('inputNome').value.trim();
      const dataNascimento = document.getElementById('inputDataNascimento').value;
      const categoria = document.getElementById('selectCategoria').value;

      const erros = validateCadastroForm(nome, dataNascimento, categoria);
      if (erros.length > 0) {
        erros.forEach(err => showFormError(err.campo, err.msg));
        return;
      }

      state.alunos.push({ id: generateId(), nome, dataNascimento, categoria });
      saveState();

      // Reset form fields
      document.getElementById('inputNome').value = '';
      document.getElementById('inputDataNascimento').value = '';
      document.getElementById('selectCategoria').value = '';

      renderAlunos();
      fecharCadastro();
      showToast('Aluno cadastrado com sucesso!');
    });

    // ─── US2: Filters ───────────────────────────────────────────────────────────
    document.getElementById('filtroNome').addEventListener('input', renderAlunos);
    document.getElementById('filtroCategoria').addEventListener('change', renderAlunos);

    // ─── Mock data ───────────────────────────────────────────────────────────────
    const NOMES = ['Lucas', 'Gabriel', 'Pedro', 'Mateus', 'Rafael', 'Felipe', 'Gustavo', 'Henrique',
                   'Bruno', 'Thiago', 'Carlos', 'Diego', 'André', 'Rodrigo', 'Leonardo',
                   'Ana', 'Beatriz', 'Julia', 'Mariana', 'Larissa', 'Camila', 'Isabela',
                   'Fernanda', 'Amanda', 'Natalia'];
    const SOBRENOMES = ['Silva', 'Santos', 'Oliveira', 'Souza', 'Lima', 'Ferreira', 'Costa',
                        'Rodrigues', 'Almeida', 'Nascimento', 'Carvalho', 'Pereira', 'Gomes', 'Martins', 'Rocha'];
    const CATEGORIAS_MOCK = ['Sub09', 'Sub10', 'Sub11', 'Sub12', 'Sub13', 'Sub14'];

    function gerarNomeAleatorio() {
      const nome = NOMES[Math.floor(Math.random() * NOMES.length)];
      const sobrenome = SOBRENOMES[Math.floor(Math.random() * SOBRENOMES.length)];
      return `${nome} ${sobrenome}`;
    }

    function gerarDataAleatoria(inicio, fim) {
      const tsInicio = new Date(inicio).getTime();
      const tsFim = new Date(fim).getTime();
      const ts = tsInicio + Math.random() * (tsFim - tsInicio);
      return new Date(ts).toISOString().split('T')[0];
    }

    function gerarMockData() {
      const alunos = [];
      const avaliacoes = [];
      for (let i = 0; i < 40; i++) {
        const alunoId = generateId();
        const categoria = CATEGORIAS_MOCK[i % CATEGORIAS_MOCK.length];
        const anoNasc = 2010 + Math.floor(Math.random() * 8);
        const mesNasc = String(1 + Math.floor(Math.random() * 12)).padStart(2, '0');
        const diaNasc = String(1 + Math.floor(Math.random() * 28)).padStart(2, '0');
        alunos.push({
          id: alunoId,
          nome: gerarNomeAleatorio(),
          dataNascimento: `${anoNasc}-${mesNasc}-${diaNasc}`,
          categoria,
        });

        const qtd = 5 + Math.floor(Math.random() * 11); // 5–15
        const datasUsadas = new Set();
        for (let j = 0; j < qtd; j++) {
          let data;
          let tentativas = 0;
          do {
            data = gerarDataAleatoria('2025-01-01', '2026-04-04');
            tentativas++;
          } while (datasUsadas.has(data) && tentativas < 50);
          datasUsadas.add(data);
          avaliacoes.push({
            id: generateId(),
            alunoId,
            data,
            tatico:  2 + Math.floor(Math.random() * 4),
            tecnico: 2 + Math.floor(Math.random() * 4),
            mental:  2 + Math.floor(Math.random() * 4),
          });
        }
      }
      return { alunos, avaliacoes };
    }

    // ─── Boot ────────────────────────────────────────────────────────────────────
    initCategoriaDropdowns();

    if (state.alunos.length === 0) {
      const mock = gerarMockData();
      state.alunos.push(...mock.alunos);
      state.avaliacoes.push(...mock.avaliacoes);
      saveState();
    }

    renderAlunos();
  </script>

</body>
</html>
