<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imperial Soccer — Avaliação do Aluno</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="../css/imperial.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            imperial: {
              green:         '#2a7a3d',
              'green-mid':   '#16a34a',
              'green-light': '#dcfce7',
              red:           '#dc2626',
              'red-light':   '#fee2e2',
              bg:            '#f0f4f1',
              card:          '#ffffff',
              text:          '#111827',
              'text-muted':  '#6b7280',
              border:        '#e5e7eb',
            }
          },
          fontFamily: {
            display: ['Georgia', 'serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-imperial-bg text-imperial-text min-h-screen flex flex-col pb-16">

  <!-- Header -->
  <header class="w-full bg-imperial-green shadow-md px-5 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <svg class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <path d="M12 2 C10 6 6 8 6 12 C6 16 10 18 12 22" stroke="currentColor" stroke-width="1" fill="none"/>
        <path d="M12 2 C14 6 18 8 18 12 C18 16 14 18 12 22" stroke="currentColor" stroke-width="1" fill="none"/>
        <path d="M2 12 L22 12" stroke="currentColor" stroke-width="1" fill="none"/>
      </svg>
      <div>
        <div class="text-base font-bold text-white leading-tight">Imperial Soccer</div>
        <div class="text-xs text-white/70">Avaliação do Aluno</div>
      </div>
    </div>
    <button
      type="button"
      id="btnVoltar"
      class="inline-flex items-center gap-1 text-sm font-medium text-white/80 hover:text-white transition-colors"
    >
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M11 17l-5-5m0 0l5-5m-5 5h12" />
      </svg>
      Voltar
    </button>
  </header>

  <!-- Toast notification -->
  <div
    id="toast"
    class="hidden fixed top-6 right-6 z-50 px-5 py-3 rounded-xl text-sm font-medium shadow-xl pointer-events-none"
    role="status"
    aria-live="polite"
  ></div>

  <!-- Main -->
  <main class="flex-1 w-full max-w-2xl mx-auto px-4 py-6 space-y-6">

    <!-- Student info + Nova Avaliação button -->
    <section aria-labelledby="tituloAluno">
      <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4">
        <div>
          <h1 id="tituloAluno" class="text-xl font-bold text-imperial-text"></h1>
          <p id="subtituloAluno" class="text-sm text-imperial-text-muted mt-1"></p>
        </div>
        <button
          type="button"
          id="btnNovaAvaliacao"
          class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-imperial-green hover:opacity-90 text-white text-sm font-semibold transition-all duration-200 shadow-md focus:outline-none focus:ring-2 focus:ring-imperial-green focus:ring-offset-2 shrink-0"
        >
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
          </svg>
          Nova Avaliação
        </button>
      </div>
    </section>

    <!-- New evaluation form (hidden by default) -->
    <section id="secaoNovaAvaliacao" aria-labelledby="tituloNovaAvaliacao" class="hidden">
      <h2 id="tituloNovaAvaliacao" class="text-lg font-bold text-imperial-text mb-4">Nova Avaliação</h2>
      <form id="formNovaAvaliacao" class="bg-imperial-card rounded-2xl p-5 space-y-5 border border-imperial-border shadow-sm" novalidate>

        <!-- Data -->
        <div>
          <label for="inputDataAvaliacao" class="block text-sm font-medium text-imperial-text mb-1">
            Data de Realização <span class="text-imperial-red">*</span>
          </label>
          <input
            type="date"
            id="inputDataAvaliacao"
            class="w-full sm:w-64 px-4 py-2.5 rounded-lg bg-imperial-bg border border-imperial-border text-imperial-text focus:outline-none focus:ring-2 focus:ring-imperial-green focus:border-transparent transition-all"
          />
          <p id="erroDataAvaliacao" class="hidden mt-1 text-xs text-imperial-red" role="alert"></p>
        </div>

        <!-- Tático -->
        <fieldset>
          <legend class="text-sm font-semibold text-imperial-text mb-2">Tático</legend>
          <p id="erroTatico" class="hidden mb-2 text-xs text-imperial-red" role="alert"></p>
          <div id="grupoTatico" class="grid grid-cols-2 sm:grid-cols-4 gap-2"></div>
        </fieldset>

        <!-- Técnico -->
        <fieldset>
          <legend class="text-sm font-semibold text-imperial-text mb-2">Técnico</legend>
          <p id="erroTecnico" class="hidden mb-2 text-xs text-imperial-red" role="alert"></p>
          <div id="grupoTecnico" class="grid grid-cols-2 sm:grid-cols-4 gap-2"></div>
        </fieldset>

        <!-- Mental -->
        <fieldset>
          <legend class="text-sm font-semibold text-imperial-text mb-2">Mental</legend>
          <p id="erroMental" class="hidden mb-2 text-xs text-imperial-red" role="alert"></p>
          <div id="grupoMental" class="grid grid-cols-2 sm:grid-cols-4 gap-2"></div>
        </fieldset>

        <!-- Actions -->
        <div class="pt-1 flex flex-col sm:flex-row gap-3">
          <button
            type="submit"
            class="w-full sm:w-auto px-8 py-3 rounded-xl bg-imperial-green hover:opacity-90 text-white font-semibold transition-all duration-200 shadow-md focus:outline-none focus:ring-2 focus:ring-imperial-green focus:ring-offset-2"
          >
            Salvar Avaliação
          </button>
          <button
            type="button"
            id="btnCancelarNovaAvaliacao"
            class="w-full sm:w-auto px-8 py-3 rounded-xl border border-imperial-border text-imperial-text-muted hover:text-imperial-text font-medium transition-all"
          >
            Cancelar
          </button>
        </div>

      </form>
    </section>

    <!-- Chart section -->
    <section aria-labelledby="tituloGrafico">
      <h2 id="tituloGrafico" class="text-lg font-bold text-imperial-text mb-4">Evolução do Aluno</h2>
      <div class="bg-imperial-card rounded-2xl p-4 border border-imperial-border shadow-sm">
        <div id="graficoPlaceholder" class="py-10 text-center text-imperial-text-muted text-sm">
          Registre avaliações para visualizar o gráfico de evolução.
        </div>
        <canvas id="graficoEvolucao" class="w-full hidden"></canvas>
      </div>
    </section>

    <!-- Evaluation list -->
    <section aria-labelledby="tituloHistorico">
      <h2 id="tituloHistorico" class="text-lg font-bold text-imperial-text mb-4">Histórico de Avaliações</h2>
      <div id="listaAvaliacoes" class="space-y-2" role="list" aria-live="polite"></div>

      <!-- Pagination controls -->
      <div id="controlesPaginacao" class="hidden items-center justify-between mt-4 pt-4 border-t border-imperial-border">
        <button
          type="button"
          id="btnPaginaAnterior"
          class="inline-flex items-center gap-1 px-4 py-2 rounded-lg text-sm font-medium border border-imperial-border text-imperial-text-muted hover:text-imperial-text hover:border-imperial-text-muted disabled:opacity-40 disabled:cursor-not-allowed transition-all"
        >
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
          </svg>
          Anterior
        </button>
        <span id="indicadorPagina" class="text-sm text-imperial-text-muted"></span>
        <button
          type="button"
          id="btnProximaPagina"
          class="inline-flex items-center gap-1 px-4 py-2 rounded-lg text-sm font-medium border border-imperial-border text-imperial-text-muted hover:text-imperial-text hover:border-imperial-text-muted disabled:opacity-40 disabled:cursor-not-allowed transition-all"
        >
          Próxima
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </button>
      </div>

      <!-- Voltar button at bottom of list -->
      <div class="mt-6 flex justify-start">
        <button
          type="button"
          id="btnVoltarRodape"
          class="inline-flex items-center gap-1 text-sm font-medium text-imperial-green hover:opacity-80 transition-colors"
        >
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11 17l-5-5m0 0l5-5m-5 5h12" />
          </svg>
          Voltar para Alunos
        </button>
      </div>
    </section>

  </main>

  <!-- Menu de navegação inferior -->
  <nav class="fixed bottom-0 left-0 right-0 bg-imperial-card border-t border-imperial-border flex h-16 z-40">
    <a
      href="students.html"
      class="flex-1 flex flex-col items-center justify-center gap-1 text-imperial-green border-t-2 border-imperial-green font-semibold"
      aria-label="Alunos"
      aria-current="page"
    >
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
      <span class="text-xs font-medium">Alunos</span>
    </a>
    <a
      href="training.html"
      class="flex-1 flex flex-col items-center justify-center gap-1 text-imperial-text-muted hover:text-imperial-green transition-colors"
      aria-label="Treino"
    >
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
      <span class="text-xs font-medium">Treino</span>
    </a>
    <a
      href="games.html"
      class="flex-1 flex flex-col items-center justify-center gap-1 text-imperial-text-muted hover:text-imperial-green transition-colors"
      aria-label="Jogos"
    >
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="14" r="6"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8V5M10 5h4M12 14l2.5-2.5"/>
      </svg>
      <span class="text-xs font-medium">Jogos</span>
    </a>
  </nav>

  <script type="module">
    // ─── Constants ──────────────────────────────────────────────────────────────
    const CATEGORIAS_LABELS = {
      Sub09: 'Sub 09', Sub10: 'Sub 10', Sub11: 'Sub 11',
      Sub12: 'Sub 12', Sub13: 'Sub 13', Sub14: 'Sub 14',
    };

    const NOTAS = [
      { label: 'Excelente',        valor: 5 },
      { label: 'Bom',              valor: 4 },
      { label: 'Regular',          valor: 3 },
      { label: 'Precisa Melhorar', valor: 2 },
    ];

    const ICONS = {
      tecnico: `<svg class="w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 2 C10 6 6 8 6 12 C6 16 10 18 12 22" stroke-width="1"/>
        <path d="M12 2 C14 6 18 8 18 12 C18 16 14 18 12 22" stroke-width="1"/>
        <path d="M2 12 L22 12" stroke-width="1"/>
      </svg>`,
      tatico: `<svg class="w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <path stroke-linejoin="round" d="M12 2 L22 12 L12 22 L2 12 Z"/>
        <path stroke-linejoin="round" stroke-width="1" d="M12 6 L18 12 L12 18 L6 12 Z"/>
      </svg>`,
      mental: `<svg class="w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 21h6"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 21v-4"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3C9.2 3 7 5.2 7 8c0 2.2 1.3 4.1 3.2 5l-.2 4h4l-.2-4C15.7 12.1 17 10.2 17 8c0-2.8-2.2-5-5-5z"/>
      </svg>`,
    };

    const ASPECT_LABELS = { tatico: 'Tát', tecnico: 'Téc', mental: 'Ment' };
    const PAGE_SIZE = 10;

    // ─── State & sessionStorage ──────────────────────────────────────────────────
    const STATE_KEY = 'imperialState';

    function loadState() {
      try {
        const raw = sessionStorage.getItem(STATE_KEY);
        if (!raw) return { alunos: [], avaliacoes: [] };
        return JSON.parse(raw);
      } catch {
        return { alunos: [], avaliacoes: [] };
      }
    }

    function saveState() {
      sessionStorage.setItem(STATE_KEY, JSON.stringify(state));
    }

    const state = loadState();

    // ─── URL param ───────────────────────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const alunoId = params.get('alunoId');
    if (!alunoId) {
      window.location.href = 'students.html';
    }

    const aluno = state.alunos.find(a => a.id === alunoId);
    if (!aluno) {
      window.location.href = 'students.html';
    }

    // ─── Pagination state ────────────────────────────────────────────────────────
    let paginaAtual = 0;
    let chartInstance = null;

    // ─── Utilities ───────────────────────────────────────────────────────────────
    function generateId() {
      return crypto.randomUUID();
    }

    function formatDate(isoDate) {
      if (!isoDate) return '';
      const dateStr = isoDate.substring(0, 10);
      const [year, month, day] = dateStr.split('-');
      return `${day}/${month}/${year}`;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function todayISO() {
      return new Date().toISOString().split('T')[0];
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = [
        'fixed top-6 right-6 z-50 px-5 py-3 rounded-xl text-sm font-medium shadow-xl pointer-events-none',
        type === 'success' ? 'bg-imperial-green text-white' : 'bg-imperial-red text-white',
      ].join(' ');
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    // ─── Form toggle ──────────────────────────────────────────────────────────────
    function mostrarFormulario() {
      document.getElementById('secaoNovaAvaliacao').classList.remove('hidden');
      document.getElementById('btnNovaAvaliacao').disabled = true;
      document.getElementById('btnNovaAvaliacao').classList.add('opacity-50', 'cursor-not-allowed');
      document.getElementById('inputDataAvaliacao').focus();
    }

    function ocultarFormulario() {
      document.getElementById('secaoNovaAvaliacao').classList.add('hidden');
      document.getElementById('btnNovaAvaliacao').disabled = false;
      document.getElementById('btnNovaAvaliacao').classList.remove('opacity-50', 'cursor-not-allowed');
    }

    // ─── Chart ───────────────────────────────────────────────────────────────────
    Chart.defaults.color = '#6b7280';
    Chart.defaults.borderColor = '#e5e7eb';

    function renderGrafico(todasAvaliacoes) {
      // Chart always uses all evaluations (ASC order for timeline readability)
      const avaliacoes = [...todasAvaliacoes].sort((a, b) => a.data.localeCompare(b.data));
      const canvas = document.getElementById('graficoEvolucao');
      const placeholder = document.getElementById('graficoPlaceholder');

      if (chartInstance) {
        chartInstance.destroy();
        chartInstance = null;
      }

      if (avaliacoes.length === 0) {
        canvas.classList.add('hidden');
        placeholder.classList.remove('hidden');
        return;
      }

      canvas.classList.remove('hidden');
      placeholder.classList.add('hidden');

      const labels = avaliacoes.map(av => formatDate(av.data));
      chartInstance = new Chart(canvas, {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: 'Tático',
              data: avaliacoes.map(av => av.tatico),
              borderColor: '#eab308',
              backgroundColor: 'rgba(234,179,8,0.08)',
              tension: 0.3,
              pointRadius: 5,
              pointHoverRadius: 7,
              fill: false,
            },
            {
              label: 'Técnico',
              data: avaliacoes.map(av => av.tecnico),
              borderColor: '#2a7a3d',
              backgroundColor: 'rgba(42,122,61,0.08)',
              tension: 0.3,
              pointRadius: 5,
              pointHoverRadius: 7,
              fill: false,
            },
            {
              label: 'Mental',
              data: avaliacoes.map(av => av.mental),
              borderColor: '#6366f1',
              backgroundColor: 'rgba(99,102,241,0.08)',
              tension: 0.3,
              pointRadius: 5,
              pointHoverRadius: 7,
              fill: false,
            },
          ],
        },
        options: {
          responsive: true,
          plugins: {
            legend: { labels: { color: '#94a3b8', font: { size: 13 } } },
          },
          scales: {
            x: {
              ticks: { color: '#6b7280' },
              grid: { color: '#e5e7eb' },
            },
            y: {
              min: 2,
              max: 5,
              ticks: { stepSize: 1, color: '#6b7280' },
              grid: { color: '#e5e7eb' },
            },
          },
        },
      });
    }

    // ─── Domain helpers ──────────────────────────────────────────────────────────
    function getAvaliacoesDoAluno(id) {
      // DESC order — most recent first
      return state.avaliacoes
        .filter(av => av.alunoId === id)
        .sort((a, b) => b.data.localeCompare(a.data));
    }

    function renderChip(aspecto, nota) {
      return `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs border bg-imperial-green-light text-imperial-green border-imperial-green">
        ${ICONS[aspecto]}
        <span>${ASPECT_LABELS[aspecto]}</span>
        <span class="font-bold">${nota}</span>
      </span>`;
    }

    // ─── renderNotaGroup ──────────────────────────────────────────────────────────
    function renderNotaGroup(containerId, aspecto) {
      const container = document.getElementById(containerId);
      if (!container) return;
      container.innerHTML = '';
      NOTAS.forEach(nota => {
        const inputId = `${aspecto}_${nota.valor}`;
        const label = document.createElement('label');
        label.htmlFor = inputId;
        label.className = [
          'flex flex-col items-center justify-center gap-1 p-2.5 rounded-lg border border-imperial-border',
          'cursor-pointer text-center text-xs text-imperial-text-muted transition-all select-none',
          'hover:border-imperial-green hover:text-imperial-green',
          'has-[:checked]:border-imperial-green has-[:checked]:bg-imperial-green-light has-[:checked]:text-imperial-green',
        ].join(' ');
        label.innerHTML = `
          <input type="radio" id="${inputId}" name="${aspecto}" value="${nota.valor}" class="sr-only" />
          <span class="font-bold text-sm">${nota.valor}</span>
          <span class="leading-tight">${nota.label}</span>
        `;
        container.appendChild(label);
      });
    }

    // ─── renderListaAvaliacoes (with pagination) ──────────────────────────────────
    function renderListaAvaliacoes() {
      const todasAvaliacoes = getAvaliacoesDoAluno(alunoId);
      const container = document.getElementById('listaAvaliacoes');
      const controles = document.getElementById('controlesPaginacao');

      if (todasAvaliacoes.length === 0) {
        container.innerHTML = `
          <div class="py-14 text-center text-imperial-text-muted text-sm">Nenhuma avaliação registrada ainda.</div>
        `;
        controles.classList.add('hidden');
        controles.classList.remove('flex');
        renderGrafico([]);
        return;
      }

      const totalPaginas = Math.ceil(todasAvaliacoes.length / PAGE_SIZE);
      // Clamp paginaAtual if needed (e.g. after delete)
      if (paginaAtual >= totalPaginas) paginaAtual = totalPaginas - 1;

      const pagina = todasAvaliacoes.slice(paginaAtual * PAGE_SIZE, (paginaAtual + 1) * PAGE_SIZE);

      container.innerHTML = pagina.map(av => `
        <div class="bg-imperial-card rounded-xl px-5 py-4 border border-imperial-border shadow-sm"
             role="listitem" data-av-id="${escapeHtml(av.id)}">
          <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
            <div class="space-y-2">
              <div class="text-sm font-semibold text-imperial-text">${formatDate(av.data)}</div>
              <div class="flex items-center gap-1.5 flex-wrap">
                ${renderChip('tatico', av.tatico)}
                ${renderChip('tecnico', av.tecnico)}
                ${renderChip('mental', av.mental)}
              </div>
            </div>
            <div class="flex gap-2 shrink-0">
              <button
                type="button"
                class="btn-editar px-3 py-1.5 rounded-lg text-xs font-medium border border-imperial-border text-imperial-text-muted hover:text-imperial-text hover:border-imperial-text-muted transition-all"
                data-av-id="${escapeHtml(av.id)}"
                aria-label="Editar avaliação de ${formatDate(av.data)}"
              >Editar</button>
              <button
                type="button"
                class="btn-excluir px-3 py-1.5 rounded-lg text-xs font-medium border border-imperial-red/30 text-imperial-red hover:bg-imperial-red-light transition-all"
                data-av-id="${escapeHtml(av.id)}"
                aria-label="Excluir avaliação de ${formatDate(av.data)}"
              >Excluir</button>
            </div>
          </div>
        </div>
      `).join('');

      container.querySelectorAll('.btn-editar').forEach(btn => {
        btn.addEventListener('click', () => abrirEdicao(btn.dataset.avId));
      });
      container.querySelectorAll('.btn-excluir').forEach(btn => {
        btn.addEventListener('click', () => excluirAvaliacao(btn.dataset.avId));
      });

      // Pagination controls
      if (totalPaginas > 1) {
        controles.classList.remove('hidden');
        controles.classList.add('flex');
        document.getElementById('indicadorPagina').textContent = `Página ${paginaAtual + 1} de ${totalPaginas}`;
        document.getElementById('btnPaginaAnterior').disabled = paginaAtual === 0;
        document.getElementById('btnProximaPagina').disabled = paginaAtual === totalPaginas - 1;
      } else {
        controles.classList.add('hidden');
        controles.classList.remove('flex');
      }

      renderGrafico(todasAvaliacoes);
    }

    // ─── Edit inline ──────────────────────────────────────────────────────────────
    function abrirEdicao(id) {
      const av = state.avaliacoes.find(a => a.id === id);
      if (!av) return;

      const item = document.querySelector(`[data-av-id="${id}"]`);
      if (!item) return;

      const safeId = id.replace(/-/g, '_');

      item.innerHTML = `
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-imperial-text mb-1">Data de Realização</label>
            <input
              type="date"
              id="editData_${safeId}"
              value="${av.data.substring(0, 10)}"
              max="${todayISO()}"
              class="w-full sm:w-64 px-4 py-2.5 rounded-lg bg-imperial-bg border border-imperial-border text-imperial-text focus:outline-none focus:ring-2 focus:ring-imperial-green focus:border-transparent transition-all"
            />
            <p id="editErroData_${safeId}" class="hidden mt-1 text-xs text-imperial-red" role="alert"></p>
          </div>
          <fieldset>
            <legend class="text-sm font-semibold text-imperial-text mb-2">Tático</legend>
            <p id="editErroTatico_${safeId}" class="hidden mb-2 text-xs text-imperial-red" role="alert"></p>
            <div id="editGrupoTatico_${safeId}" class="grid grid-cols-2 sm:grid-cols-4 gap-2"></div>
          </fieldset>
          <fieldset>
            <legend class="text-sm font-semibold text-imperial-text mb-2">Técnico</legend>
            <p id="editErroTecnico_${safeId}" class="hidden mb-2 text-xs text-imperial-red" role="alert"></p>
            <div id="editGrupoTecnico_${safeId}" class="grid grid-cols-2 sm:grid-cols-4 gap-2"></div>
          </fieldset>
          <fieldset>
            <legend class="text-sm font-semibold text-imperial-text mb-2">Mental</legend>
            <p id="editErroMental_${safeId}" class="hidden mb-2 text-xs text-imperial-red" role="alert"></p>
            <div id="editGrupoMental_${safeId}" class="grid grid-cols-2 sm:grid-cols-4 gap-2"></div>
          </fieldset>
          <div class="flex gap-3 justify-end pt-1">
            <button type="button" class="btn-cancelar-edicao px-4 py-2 rounded-lg border border-imperial-border text-imperial-text-muted text-sm font-medium hover:text-imperial-text transition-all">Cancelar</button>
            <button type="button" class="btn-salvar-edicao px-4 py-2 rounded-lg bg-imperial-green hover:opacity-90 text-white text-sm font-semibold transition-all shadow-md">Salvar</button>
          </div>
        </div>
      `;

      ['tatico', 'tecnico', 'mental'].forEach(asp => {
        const labelCap = asp.charAt(0).toUpperCase() + asp.slice(1);
        const nameAttr = `edit_${asp}_${safeId}`;
        renderNotaGroup(`editGrupo${labelCap}_${safeId}`, nameAttr);
        const radio = item.querySelector(`input[name="${nameAttr}"][value="${av[asp]}"]`);
        if (radio) radio.checked = true;
      });

      item.querySelector('.btn-cancelar-edicao').addEventListener('click', () => renderListaAvaliacoes());
      item.querySelector('.btn-salvar-edicao').addEventListener('click', () => salvarEdicao(id, safeId));
    }

    function salvarEdicao(id, safeId) {
      const item = document.querySelector(`[data-av-id="${id}"]`);
      if (!item) return;

      const dataInput = document.getElementById(`editData_${safeId}`);
      const data = dataInput ? dataInput.value : '';
      const taticoRadio = item.querySelector(`input[name="edit_tatico_${safeId}"]:checked`);
      const tecnicoRadio = item.querySelector(`input[name="edit_tecnico_${safeId}"]:checked`);
      const mentalRadio  = item.querySelector(`input[name="edit_mental_${safeId}"]:checked`);

      ['Data', 'Tatico', 'Tecnico', 'Mental'].forEach(lbl => {
        const el = document.getElementById(`editErro${lbl}_${safeId}`);
        if (el) { el.textContent = ''; el.classList.add('hidden'); }
      });

      let valid = true;
      if (!data) {
        const el = document.getElementById(`editErroData_${safeId}`);
        if (el) { el.textContent = 'A data é obrigatória.'; el.classList.remove('hidden'); }
        valid = false;
      } else if (data > todayISO()) {
        const el = document.getElementById(`editErroData_${safeId}`);
        if (el) { el.textContent = 'A data não pode ser futura.'; el.classList.remove('hidden'); }
        valid = false;
      }
      if (!taticoRadio) {
        const el = document.getElementById(`editErroTatico_${safeId}`);
        if (el) { el.textContent = 'Selecione uma nota para Tático.'; el.classList.remove('hidden'); }
        valid = false;
      }
      if (!tecnicoRadio) {
        const el = document.getElementById(`editErroTecnico_${safeId}`);
        if (el) { el.textContent = 'Selecione uma nota para Técnico.'; el.classList.remove('hidden'); }
        valid = false;
      }
      if (!mentalRadio) {
        const el = document.getElementById(`editErroMental_${safeId}`);
        if (el) { el.textContent = 'Selecione uma nota para Mental.'; el.classList.remove('hidden'); }
        valid = false;
      }
      if (!valid) return;

      const idx = state.avaliacoes.findIndex(a => a.id === id);
      if (idx !== -1) {
        state.avaliacoes[idx] = {
          ...state.avaliacoes[idx],
          data,
          tatico:  parseInt(taticoRadio.value, 10),
          tecnico: parseInt(tecnicoRadio.value, 10),
          mental:  parseInt(mentalRadio.value, 10),
        };
      }

      saveState();
      paginaAtual = 0;
      renderListaAvaliacoes();
      showToast('Avaliação atualizada com sucesso!');
    }

    // ─── Delete ───────────────────────────────────────────────────────────────────
    function excluirAvaliacao(id) {
      if (!window.confirm('Excluir esta avaliação?')) return;
      state.avaliacoes = state.avaliacoes.filter(a => a.id !== id);
      saveState();
      paginaAtual = 0;
      renderListaAvaliacoes();
      showToast('Avaliação excluída.', 'error');
    }

    // ─── New evaluation form ──────────────────────────────────────────────────────
    function validateNovaAvaliacao(data, taticoChecked, tecnicoChecked, mentalChecked) {
      const erros = [];
      if (!data) {
        erros.push({ campo: 'DataAvaliacao', msg: 'A data é obrigatória.' });
      } else if (data > todayISO()) {
        erros.push({ campo: 'DataAvaliacao', msg: 'A data não pode ser futura.' });
      }
      if (!taticoChecked)  erros.push({ campo: 'Tatico',  msg: 'Selecione uma nota para Tático.' });
      if (!tecnicoChecked) erros.push({ campo: 'Tecnico', msg: 'Selecione uma nota para Técnico.' });
      if (!mentalChecked)  erros.push({ campo: 'Mental',  msg: 'Selecione uma nota para Mental.' });
      return erros;
    }

    document.getElementById('formNovaAvaliacao').addEventListener('submit', function (e) {
      e.preventDefault();

      ['DataAvaliacao', 'Tatico', 'Tecnico', 'Mental'].forEach(campo => {
        const el = document.getElementById(`erro${campo}`);
        if (el) { el.textContent = ''; el.classList.add('hidden'); }
      });

      const data    = document.getElementById('inputDataAvaliacao').value;
      const tatico  = document.querySelector('input[name="tatico"]:checked');
      const tecnico = document.querySelector('input[name="tecnico"]:checked');
      const mental  = document.querySelector('input[name="mental"]:checked');

      const erros = validateNovaAvaliacao(data, tatico, tecnico, mental);
      if (erros.length > 0) {
        erros.forEach(err => {
          const el = document.getElementById(`erro${err.campo}`);
          if (el) { el.textContent = err.msg; el.classList.remove('hidden'); }
        });
        return;
      }

      state.avaliacoes.push({
        id:       generateId(),
        alunoId,
        data,
        tatico:   parseInt(tatico.value, 10),
        tecnico:  parseInt(tecnico.value, 10),
        mental:   parseInt(mental.value, 10),
      });

      saveState();
      paginaAtual = 0;
      renderListaAvaliacoes();
      showToast('Avaliação registrada com sucesso!');

      // Reset and hide form
      document.getElementById('inputDataAvaliacao').value = '';
      ['grupoTatico', 'grupoTecnico', 'grupoMental'].forEach((gId, i) => {
        renderNotaGroup(gId, ['tatico', 'tecnico', 'mental'][i]);
      });
      ocultarFormulario();
    });

    document.getElementById('btnNovaAvaliacao').addEventListener('click', mostrarFormulario);

    document.getElementById('btnCancelarNovaAvaliacao').addEventListener('click', function () {
      ocultarFormulario();
    });

    // ─── Pagination listeners ─────────────────────────────────────────────────────
    document.getElementById('btnPaginaAnterior').addEventListener('click', function () {
      if (paginaAtual > 0) {
        paginaAtual--;
        renderListaAvaliacoes();
      }
    });

    document.getElementById('btnProximaPagina').addEventListener('click', function () {
      const total = Math.ceil(getAvaliacoesDoAluno(alunoId).length / PAGE_SIZE);
      if (paginaAtual < total - 1) {
        paginaAtual++;
        renderListaAvaliacoes();
      }
    });

    // ─── Voltar ───────────────────────────────────────────────────────────────────
    function voltarParaAlunos() {
      saveState();
      window.location.href = 'students.html';
    }

    document.getElementById('btnVoltar').addEventListener('click', voltarParaAlunos);
    document.getElementById('btnVoltarRodape').addEventListener('click', voltarParaAlunos);

    // ─── Boot ─────────────────────────────────────────────────────────────────────
    document.getElementById('tituloAluno').textContent = aluno.nome;
    document.getElementById('subtituloAluno').textContent = CATEGORIAS_LABELS[aluno.categoria] || aluno.categoria;

    document.getElementById('inputDataAvaliacao').max = todayISO();
    document.getElementById('inputDataAvaliacao').value = todayISO();

    renderNotaGroup('grupoTatico',  'tatico');
    renderNotaGroup('grupoTecnico', 'tecnico');
    renderNotaGroup('grupoMental',  'mental');

    renderListaAvaliacoes();
  </script>

</body>
</html>
